<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAFTAR AKUN VIP - GARUDA 88</title>
    <style>
        body { background-color: #0d0d0d; color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        .header { background: linear-gradient(to bottom, #1a1a1a, #000); padding: 20px; text-align: center; border-bottom: 2px solid #ff0000; }
        .logo { color: #ff0000; font-size: 30px; font-weight: 900; letter-spacing: 2px; margin: 0; text-shadow: 2px 2px #000; }
        
        .container { width: 95%; max-width: 450px; margin: 20px auto; background: #151515; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .form-header { background: #222; padding: 15px; text-align: center; border-bottom: 1px solid #444; }
        .form-header h2 { margin: 0; color: #ffff00; font-size: 18px; text-transform: uppercase; }

        .form-body { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        
        .input-box { position: relative; display: flex; align-items: center; }
        .input-box span { position: absolute; left: 12px; color: #ffff00; font-weight: bold; }
        
        input, select { 
            width: 100%; 
            background: #2a2a2a; 
            border: 1px solid #444; 
            padding: 12px 12px 12px 40px; 
            color: #fff; 
            border-radius: 5px; 
            font-size: 14px; 
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: #ffff00; background: #333; outline: none; }

        .btn-register { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(to bottom, #ffff00, #b2b200); 
            border: none; 
            color: #000; 
            font-weight: 900; 
            font-size: 16px; 
            border-radius: 5px; 
            cursor: pointer; 
            text-transform: uppercase;
            margin-top: 10px;
        }

        .btn-register:hover { background: #ffff00; box-shadow: 0 0 10px rgba(255, 255, 0, 0.5); }
        
        .footer-note { text-align: center; padding: 15px; font-size: 11px; color: #666; }
        .back-home { display: block; text-align: center; color: #ff0000; text-decoration: none; font-size: 13px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">GARUDA 88</h1>
    </div>

    <div class="container">
        <div class="form-header">
            <h2>Formulir Pendaftaran Akun</h2>
        </div>
        
        <div class="form-body">
            <div class="form-group">
                <label>Nama Pengguna (Username)</label>
                <div class="input-box">
                    <span>👤</span>
                    <input type="text" placeholder="Masukkan Username" required>
                </div>
            </div>

            <div class="form-group">
                <label>Kata Sandi (Password)</label>
                <div class="input-box">
                    <span>🔑</span>
                    <input type="password" placeholder="Masukkan Password" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-box">
                    <span>📧</span>
                    <input type="email" placeholder="contoh@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Pilih Bank / E-Wallet</label>
                <div class="input-box">
                    <span>🏦</span>
                    <select required>
                        <option value="">-- Pilih Bank --</option>
                        <option value="bca">BCA</option>
                        <option value="bni">BNI</option>
                        <option value="bri">BRI</option>
                        <option value="mandiri">MANDIRI</option>
                        <option value="dana">DANA</option>
                        <option value="ovo">OVO</option>
                        <option value="gopay">GOPAY</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Nomor Rekening</label>
                <div class="input-box">
                    <span>📄</span>
                    <input type="number" placeholder="Nomor Rekening Anda" required>
                </div>
            </div>

            <button class="btn-register" onclick="alert('Pendaftaran Berhasil Dikirim!')">Daftar Sekarang</button>
            
            <a href="index.html" class="back-home">Sudah punya akun? Login di sini</a>
        </div>
        
        <div class="footer-note">
            Pastikan data yang Anda masukkan valid untuk mempercepat proses deposit dan withdraw.
        </div>
    </div>

    <div style="height: 50px;"></div>

</body>
</html>
