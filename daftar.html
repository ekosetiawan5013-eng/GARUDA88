<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PENDAFTARAN - GARUDA 88</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        .container { width: 95%; max-width: 550px; margin: 20px auto; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; overflow: hidden; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .form-header { background: #222; padding: 15px; border-bottom: 2px solid #ff0000; color: #ffff00; font-weight: bold; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .form-body { padding: 20px; }
        
        .row { display: flex; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        .label { flex: 0 0 100%; font-size: 13px; margin-bottom: 5px; color: #fff; font-weight: bold; }
        
        .input-group { flex: 1; display: flex; background: #222; border: 1px solid #444; border-radius: 3px; align-items: center; transition: 0.3s; }
        .input-group:focus-within { border-color: #ffff00; }
        .input-group i.l-icon { padding: 12px; background: #333; color: #ffff00; min-width: 20px; text-align: center; }
        
        input, select { flex: 1; background: transparent; border: none; padding: 12px; color: #fff; font-size: 14px; outline: none; width: 100%; }
        select option { background: #1a1a1a; color: #fff; }
        
        .eye-btn { padding: 10px; color: #888; cursor: pointer; font-size: 14px; }
        .eye-btn:hover { color: #ffff00; }

        .check-row { display: flex; align-items: flex-start; gap: 10px; margin-top: 12px; font-size: 12px; color: #ccc; cursor: pointer; line-height: 1.4; }
        .check-row input { width: auto; margin-top: 2px; cursor: pointer; }

        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(to bottom, #ff0000, #8b0000); border: 1px solid #ff4d4d; color: #fff; font-weight: 900; font-size: 16px; border-radius: 4px; cursor: pointer; margin-top: 25px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(255,0,0,0.3); }
        .btn-submit:hover { filter: brightness(1.2); transform: translateY(-1px); }
        
        @media (min-width: 500px) { .label { flex: 0 0 160px; margin-bottom: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-header"><i class="fas fa-user-plus"></i> Daftar Akun Baru</div>
        <div class="form-body">
            
            <div class="row"><div class="label">Nama Pengguna</div><div class="input-group"><i class="fas fa-user l-icon"></i><input type="text" placeholder="Username (6-12 Karakter)" required></div></div>
            
            <div class="row"><div class="label">Kata Sandi</div><div class="input-group"><i class="fas fa-key l-icon"></i><input type="password" id="p1" placeholder="Password" required><i class="fas fa-eye eye-btn" onclick="toggle('p1')"></i></div></div>
            <div class="row"><div class="label">Konfirmasi Sandi</div><div class="input-group"><i class="fas fa-lock l-icon"></i><input type="password" id="p2" placeholder="Ulangi Password" required><i class="fas fa-eye eye-btn" onclick="toggle('p2')"></i></div></div>
            
            <div class="row"><div class="label">Email</div><div class="input-group"><i class="fas fa-envelope l-icon"></i><input type="email" placeholder="Email Aktif" required></div></div>
            <div class="row"><div class="label">Nomor Telepon</div><div class="input-group"><i class="fas fa-phone l-icon"></i><input type="tel" placeholder="Nomor HP / WhatsApp" required></div></div>
            
            <hr style="border:0; border-top: 1px solid #333; margin: 20px 0;">

            <div class="row"><div class="label">Pilih Bank</div><div class="input-group"><i class="fas fa-university l-icon"></i>
                <select required>
                    <option value="">-- Pilih Bank / E-Wallet --</option>
                    <optgroup label="BANK LOKAL">
                        <option>BCA</option><option>BNI</option><option>BRI</option><option>MANDIRI</option>
                        <option>CIMB NIAGA</option><option>DANAMON</option><option>PERMATA</option><option>PANIN</option>
                    </optgroup>
                    <optgroup label="E-WALLET">
                        <option>DANA</option><option>OVO</option><option>GOPAY</option><option>LINKAJA</option><option>SHOPEEPAY</option>
                    </optgroup>
                </select>
            </div></div>

            <div class="row"><div class="label">Nama Rekening</div><div class="input-group"><i class="fas fa-id-card l-icon"></i><input type="text" placeholder="Nama Sesuai Buku Tabungan" required></div></div>
            <div class="row"><div class="label">Nomor Rekening</div><div class="input-group"><i class="fas fa-credit-card l-icon"></i><input type="number" placeholder="Nomor Rekening / E-Wallet" required></div></div>
            <div class="row"><div class="label">Referal</div><div class="input-group"><i class="fas fa-users l-icon"></i><input type="text" placeholder="Kode Referal (Opsional)"></div></div>

            <div class="row">
                <div class="label">Validasi</div>
                <div style="flex: 1; display: flex; gap: 10px;">
                    <div class="input-group"><i class="fas fa-shield-alt l-icon"></i><input type="text" placeholder="Kode" required></div>
                    <div style="background: #ffff00; color: #000; padding: 10px; font-weight: 900; letter-spacing: 3px; border-radius: 3px;">9421</div>
                </div>
            </div>

            <label class="check-row"><input type="checkbox" required> Saya menyatakan bahwa saya telah berusia minimal 18 tahun dan memahami semua risiko permainan.</label>
            <label class="check-row"><input type="checkbox" required> Saya telah membaca dan menyetujui Syarat & Ketentuan yang berlaku di GARUDA 88.</label>

            <button class="btn-submit" onclick="window.location.href='lobby.html'">Daftar Sekarang</button>
            
            <div style="text-align: center; margin-top: 20px;"><a href="index.html" style="color: #ff0000; text-decoration: none; font-size: 13px; font-weight: bold;">Sudah punya akun? Login di sini</a></div>
        </div>
    </div>

    <script>
        function toggle(id) {
            var x = document.getElementById(id);
            x.type = (x.type === "password") ? "text" : "password";
        }
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAFTAR - GARUDA 88</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .reg-card { width: 90%; max-width: 400px; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #fc0; box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
        .logo { text-align: center; margin-bottom: 25px; color: #fc0; font-weight: 900; font-size: 28px; text-shadow: 0 0 10px #f00; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #222; border: 1px solid #444; border-radius: 5px; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: #fc0; }
        .btn-daftar { background: linear-gradient(to bottom, #fc0, #970); width: 100%; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
        .links { text-align: center; margin-top: 20px; font-size: 13px; }
        .links a { color: #fc0; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="reg-card">
    <div class="logo">GARUDA 88</div>
    <form id="registerForm">
        <div class="form-group">
            <label>USERNAME</label>
            <input type="text" id="username" placeholder="Gunakan huruf & angka" required>
        </div>
        <div class="form-group">
            <label>PASSWORD</label>
            <input type="password" id="password" placeholder="Masukkan Password" required>
        </div>
        <div class="form-group">
            <label>NAMA SESUAI REKENING</label>
            <input type="text" id="full_name" placeholder="Nama Lengkap" required>
        </div>
        <div class="form-group">
            <label>BANK / E-WALLET</label>
            <select id="bank_name">
                <option value="BCA">BCA</option>
                <option value="DANA">DANA</option>
                <option value="OVO">OVO</option>
                <option value="GOPAY">GOPAY</option>
            </select>
        </div>
        <div class="form-group">
            <label>NOMOR REKENING / HP</label>
            <input type="number" id="bank_account" placeholder="Nomor Rekening" required>
        </div>
        <button type="submit" class="btn-daftar">DAFTAR SEKARANG</button>
    </form>
    <div class="links">
        Sudah punya akun? <a href="index.html">LOGIN DISINI</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://sbtrcroononwihparzfk.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_ebxfpUwby3RO6LqhyFkU-Q_3AMzoYyn';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('full_name').value;
        const bankName = document.getElementById('bank_name').value;
        const bankAccount = document.getElementById('bank_account').value;

        // Simpan ke Supabase
        const { data, error } = await _supabase
            .from('members')
            .insert([
                { 
                    username: username, 
                    password: password, 
                    full_name: fullName,
                    bank_name: bankName,
                    bank_account: bankAccount,
                    balance: 0 
                }
            ]);

        if (error) {
            alert("Gagal Daftar: " + error.message);
        } else {
            alert("Pendaftaran Berhasil! Silakan Login.");
            window.location.href = "index.html";
        }
    });
</script>

</body>
</html>
