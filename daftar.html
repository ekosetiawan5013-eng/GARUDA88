<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUDA 88 - DAFTAR AKUN VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #4a0000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 50px; }
        .main-container { display: flex; flex-direction: column; align-items: center; width: 100%; }

        .header { background: linear-gradient(to bottom, #700000, #000); padding: 20px 0; border-bottom: 2px solid #fc0; width: 100%; text-align: center; }
        
        /* BRANDING GARUDA 88 MERAH TERANG + BLOK HITAM + NEON PUTAR */
        .brand-container {
            position: relative; display: inline-block; padding: 10px 40px; background: #000; 
            border-radius: 12px; overflow: hidden; margin: 0 auto;
        }
        .brand-name {
            font-size: 32px; font-weight: 900; color: #ff0000; position: relative;
            z-index: 2; margin: 0; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 4px #000;
        }
        .brand-container::before {
            content: ''; position: absolute; width: 200%; height: 200%;
            background: conic-gradient(transparent, #ffcc00, #fff, #ffcc00, transparent 40%);
            animation: rotate-neon 3s linear infinite; top: -50%; left: -50%;
        }
        .brand-container::after { content: ''; position: absolute; inset: 3px; background: #000; border-radius: 10px; z-index: 1; }

        @keyframes rotate-neon { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .form-box { width: 100%; padding: 25px 0; background: #000; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .form-title { color: #fc0; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* INPUT GROUP & ITEM */
        .input-group { position: relative; width: 85%; max-width: 350px; }
        .input-item, select { 
            width: 100%; height: 45px; border-radius: 8px; font-size: 14px; font-weight: bold; 
            box-sizing: border-box; border: 2px solid #fc0; background: #222; color: #fff; 
            text-align: center; outline: none; appearance: none;
        }
        select { text-align-last: center; cursor: pointer; }

        .pass-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #fc0; font-size: 18px; z-index: 10; }

        /* TOMBOL DAFTAR NEON */
        .btn-wrapper { width: 85%; max-width: 350px; height: 55px; position: relative; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-top: 10px; }
        .btn { 
            width: calc(100% - 4px); height: calc(100% - 4px); border-radius: 6px; font-size: 18px; font-weight: bold; 
            z-index: 1; border: none; cursor: pointer; text-decoration: none; display: flex; 
            align-items: center; justify-content: center; text-transform: uppercase; 
            background: linear-gradient(to bottom, #fc0, #b8860b); color: #000; 
        }
        .btn-wrapper::before { content: ''; position: absolute; width: 150%; height: 150%; background: conic-gradient(transparent, #fff, transparent 30%); animation: rotate-neon 2s linear infinite; }

        .footer-link { margin-top: 20px; color: #fff; font-size: 13px; text-decoration: none; font-weight: bold; }
        .footer-link span { color: #fc0; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <div class="brand-container">
                <h1 class="brand-name">GARUDA 88</h1>
            </div>
        </div>

        <div class="form-box">
            <div class="form-title">FORM PENDAFTARAN VIP</div>

            <div class="input-group">
                <input type="text" id="reg-u" class="input-item" placeholder="USERNAME">
            </div>

            <div class="input-group">
                <input type="password" id="reg-p" class="input-item" placeholder="PASSWORD">
                <i class="fas fa-eye pass-toggle" onclick="togglePass('reg-p', this)"></i>
            </div>

            <div class="input-group">
                <input type="password" id="reg-cp" class="input-item" placeholder="KONFIRMASI PASSWORD">
                <i class="fas fa-eye pass-toggle" onclick="togglePass('reg-cp', this)"></i>
            </div>

            <div class="input-group">
                <input type="text" id="reg-wa" class="input-item" placeholder="NOMOR WHATSAPP">
            </div>

            <div class="input-group">
                <select id="reg-bank" class="input-item">
                    <option value="" disabled selected>-- PILIH BANK / E-WALLET --</option>
                    <option value="BCA">BCA</option>
                    <option value="MANDIRI">MANDIRI</option>
                    <option value="BNI">BNI</option>
                    <option value="BRI">BRI</option>
                    <option value="CIMB">CIMB</option>
                    <option value="PERMATA">PERMATA</option>
                    <option value="PANIN">PANIN</option>
                    <option value="BTN">BTN</option>
                    <option value="DANAMON">DANAMON</option>
                    <option value="DANA">DANA</option>
                    <option value="OVO">OVO</option>
                    <option value="GOPAY">GOPAY</option>
                    <option value="LINKAJA">LINKAJA</option>
                </select>
            </div>

            <div class="input-group">
                <input type="text" id="reg-norek" class="input-item" placeholder="NOMOR REKENING">
            </div>

            <div class="input-group">
                <input type="text" id="reg-nama" class="input-item" placeholder="NAMA SESUAI REKENING">
            </div>

            <div class="btn-wrapper">
                <button onclick="register()" class="btn">DAFTAR SEKARANG</button>
            </div>

            <a href="index.html" class="footer-link">SUDAH PUNYA AKUN? <span>LOGIN DISINI</span></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Inisialisasi Koneksi Database
        const _sb = supabase.createClient('https://sbtrcroononwihparzfk.supabase.co', 'sb_publishable_ebxfpUwby3RO6LqhyFkU-Q_3AMzoYyn');

        // Fungsi Mata Anti-Typo
        function togglePass(id, icon) {
            const p = document.getElementById(id);
            if (p.type === "password") {
                p.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                p.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // FUNGSI DAFTAR (MESIN BANDAR)
        async function register() {
            const u = document.getElementById('reg-u').value;
            const p = document.getElementById('reg-p').value;
            const cp = document.getElementById('reg-cp').value;
            const wa = document.getElementById('reg-wa').value;
            const bk = document.getElementById('reg-bank').value;
            const nr = document.getElementById('reg-norek').value;
            const nm = document.getElementById('reg-nama').value;

            if(!u || !p || !wa || !bk || !nr || !nm) return alert("Woi! Isi semua datanya, Bos!");
            if(p !== cp) return alert("Password tidak sama, cek lagi!");

            try {
                // Simpan Data ke Database Supabase
                const { error } = await _sb.from('members').insert([
                    { 
                        username: u, 
                        password: p, 
                        whatsapp: wa, 
                        bank_name: bk, 
                        acc_number: nr, 
                        acc_name: nm,
                        balance: 0 
                    }
                ]);

                if (error) throw error;

                alert("DAFTAR BERHASIL! Silakan Login.");
                window.location.href = "index.html";

            } catch (err) {
                alert("Gagal Daftar: " + err.message);
            }
        }
    </script>
</body>
</html>
