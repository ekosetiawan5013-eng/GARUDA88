<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUDA 88 - OFFICIAL SITE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; }
        
        .header { 
            background: linear-gradient(to bottom, #1a0000, #000); 
            padding: 20px 15px; 
            text-align: center; 
            border-bottom: 2px solid #ff0000;
        }
        
        /* Logo Garuda */
        .logo-img {
            width: 120px; 
            filter: drop-shadow(0 0 8px #ff0000);
            margin-bottom: 5px;
        }
        
        .brand-name { 
            color: #ff0000; 
            font-size: 34px; 
            font-weight: 900; 
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #ffff00;
            margin: 0;
            text-transform: uppercase;
        }

        .marquee-box { background: #222; color: #ffff00; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #333; font-weight: bold; }

        /* Zeus Banner menggunakan gambar yang lebih stabil */
        .zeus-banner {
            width: 100%;
            height: 220px;
            background: url('https://img.imageboss.me/smb/width/600/26279.png') center/contain no-repeat, 
                        radial-gradient(circle, #222 0%, #000 100%);
            border-bottom: 3px solid #ffff00;
            position: relative;
        }

        .btn-section { padding: 25px 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            width: 100%; 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center; 
            font-weight: 900; 
            text-decoration: none; 
            font-size: 20px;
            box-sizing: border-box;
            text-transform: uppercase;
        }
        .btn-login { 
            background: linear-gradient(to bottom, #ff0000, #800000); 
            color: #fff; 
            border: 2px solid #ff4d4d;
            box-shadow: 0 5px 20px rgba(255,0,0,0.5);
        }
        .btn-daftar { 
            background: linear-gradient(to bottom, #ffff00, #b2b200); 
            color: #000; 
            border: 2px solid #fff;
            box-shadow: 0 5px 20px rgba(255,255,0,0.4);
        }

        .payment-box { background: #111; margin: 0 15px 20px; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .payment-box h3 { color: #ffff00; font-size: 14px; margin-top: 0; text-align: center; margin-bottom: 15px; }
        .bank-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-items: center; }
        .bank-grid img { width: 100%; height: auto; filter: brightness(0.9); }

        .footer { padding: 30px 10px; text-align: center; color: #555; font-size: 11px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://i.ibb.co/vYm6v6n/garuda-logo.png" class="logo-img" alt="GARUDA">
        <h1 class="brand-name">GARUDA 88</h1>
    </div>

    <div class="marquee-box">
        <marquee scrollamount="6">⚡ KAKEK ZEUS LAGI GACOR DI GARUDA 88! - MINIMAL DEPOSIT HANYA 10RB - WD BERAPAPUN PASTI CAIR ⚡</marquee>
    </div>

    <div class="zeus-banner"></div>

    <div class="btn-section">
        <a href="lobby.html" class="btn btn-login">MASUK / LOGIN</a>
        <a href="daftar.html" class="btn btn-daftar">DAFTAR AKUN VIP</a>
    </div>

    <div class="payment-box">
        <h3>SUPPORTED PAYMENT</h3>
        <div class="bank-grid">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Bank_Central_Asia.svg/512px-Bank_Central_Asia.svg.png">
            <img src="https://upload.wikimedia.org/wikipedia/id/thumb/5/55/BNI_logo.svg/512px-BNI_logo.svg.png">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Bank_Mandiri_logo_2016.svg/512px-Bank_Mandiri_logo_2016.svg.png">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/68/BANK_BRI_logo.svg/512px-BANK_BRI_logo.svg.png">
        </div>
    </div>

    <div class="footer">
        © 2026 GARUDA 88. ALL RIGHTS RESERVED.<br>
        LISENSI RESMI PAGCOR & BMM TESTLABS.
    </div>

</body>
</html>
