<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUDA 88 - OFFICIAL SITE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { 
            background: linear-gradient(to bottom, #220000, #000); 
            padding: 25px 15px; 
            text-align: center; 
            border-bottom: 2px solid #ff0000;
        }
        
        /* Logo Garuda Text-Based Style (Anti-Blokir) */
        .logo-box {
            display: inline-block;
            padding: 10px;
            border: 2px solid #ffff00;
            border-radius: 50%;
            margin-bottom: 10px;
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }
        
        .brand-name { 
            color: #ff0000; 
            font-size: 36px; 
            font-weight: 900; 
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #ffff00;
            margin: 0;
            text-transform: uppercase;
        }

        .marquee-box { background: #111; color: #ffff00; padding: 10px 0; font-size: 13px; border-bottom: 1px solid #333; font-weight: bold; border-top: 1px solid #333; }

        /* Zeus Banner menggunakan gambar Placeholder yang lebih stabil untuk Indonesia */
        .zeus-banner {
            width: 100%;
            height: 250px;
            background: url('https://files.catbox.moe/k3c7t6.png') center/contain no-repeat, 
                        radial-gradient(circle, #440000 0%, #000 100%);
            border-bottom: 3px solid #ffff00;
            position: relative;
            box-shadow: inset 0 0 50px #000;
        }

        .btn-section { padding: 30px 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            width: 100%; 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center; 
            font-weight: 900; 
            text-decoration: none; 
            font-size: 22px;
            box-sizing: border-box;
            text-transform: uppercase;
            display: block;
            transition: 0.2s;
        }
        .btn-login { 
            background: linear-gradient(to bottom, #ff0000, #800000); 
            color: #fff; 
            border: 2px solid #ff4d4d;
            box-shadow: 0 5px 20px rgba(255,0,0,0.6);
        }
        .btn-daftar { 
            background: linear-gradient(to bottom, #ffff00, #b2b200); 
            color: #000; 
            border: 2px solid #fff;
            box-shadow: 0 5px 20px rgba(255,255,0,0.5);
        }

        .payment-box { background: #111; margin: 0 15px 20px; padding: 20px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .payment-box h3 { color: #ffff00; font-size: 14px; margin-top: 0; margin-bottom: 20px; text-transform: uppercase; }
        .bank-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .bank-grid i { font-size: 30px; color: #fff; }

        .footer { padding: 40px 10px; text-align: center; color: #666; font-size: 11px; background: #050505; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-box">
            <i class="fas fa-dove" style="font-size: 40px; color: #fff;"></i>
        </div>
        <h1 class="brand-name">GARUDA 88</h1>
    </div>

    <div class="marquee-box">
        <marquee scrollamount="6">⚡ SELAMAT DATANG DI GARUDA 88 - SITUS RESMI KAKEK ZEUS GACOR - PROSES DEPO & WD TERCEPAT ⚡</marquee>
    </div>

    <div class="zeus-banner"></div>

    <div class="btn-section">
        <a href="lobby.html" class="btn btn-login">MASUK / LOGIN</a>
        <a href="daftar.html" class="btn btn-daftar">DAFTAR AKUN VIP</a>
    </div>

    <div class="payment-box">
        <h3>METODE PEMBAYARAN TERLENGKAP</h3>
        <div class="bank-grid">
            <i class="fab fa-cc-visa"></i>
            <i class="fab fa-cc-mastercard"></i>
            <i class="fas fa-university"></i>
            <i class="fas fa-money-check-alt"></i>
            <i class="fas fa-mobile-alt"></i>
        </div>
        <p style="font-size: 10px; color: #888; margin-top: 15px;">BCA - BNI - BRI - MANDIRI - DANA - OVO - GOPAY</p>
    </div>

    <div class="footer">
        © 2026 GARUDA 88. ALL RIGHTS RESERVED.<br>
        LISENSI RESMI PAGCOR & BMM TESTLABS.
    </div>

</body>
</html>
