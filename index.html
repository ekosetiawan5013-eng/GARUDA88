<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - GARUDA 88</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Arial Black', Gadget, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        
        /* Area Logo */
        .header-images { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; }
        .logo-img { width: 120px; height: auto; filter: drop-shadow(0 0 10px #fc0); }
        
        .login-card { background: linear-gradient(180deg, #111 0%, #000 100%); padding: 25px; border-radius: 15px; border: 2px solid #fc0; box-shadow: 0 0 20px rgba(255, 204, 0, 0.3); }
        .brand-name { color: #fc0; font-size: 30px; font-weight: 900; text-shadow: 2px 2px #000; margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #fc0; border-radius: 5px; color: #fff; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .btn-login { background: linear-gradient(180deg, #fc0 0%, #b8860b 100%); color: #000; width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        
        .links { margin-top: 20px; font-size: 14px; }
        .links a { color: #fc0; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-images">
        <img src="zeus.png" alt="Zeus" class="logo-img">
        <img src="garuda.png" alt="Garuda" class="logo-img">
    </div>

    <div class="login-card">
        <div class="brand-name">GARUDA 88</div>
        <form id="loginForm">
            <input type="text" id="userInp" placeholder="USERNAME" required>
            <input type="password" id="passInp" placeholder="PASSWORD" required>
            <button type="submit" class="btn-login">LOGIN SEKARANG</button>
        </form>
        <div class="links">
            BELUM PUNYA AKUN? <br>
            <a href="daftar.html">KLIK DAFTAR DI SINI</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient('https://sbtrcroononwihparzfk.supabase.co', 'sb_publishable_ebxfpUwby3RO6LqhyFkU-Q_3AMzoYyn');
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const u = document.getElementById('userInp').value;
        const p = document.getElementById('passInp').value;

        const { data, error } = await _supabase
            .from('members')
            .select('*')
            .eq('username', u)
            .eq('password', p)
            .single();

        if (data) {
            localStorage.setItem("loggedInUser", data.username);
            window.location.href = "lobby.html";
        } else {
            alert("Username atau Password Salah!");
        }
    });
</script>

</body>
</html>
