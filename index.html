<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUDA 88 - OFFICIAL SITE</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }
        
        /* Header Ringkas: Logo & Nama dalam SATU BARIS */
        .header { 
            background: linear-gradient(to bottom, #400, #000); 
            padding: 10px 15px; 
            border-bottom: 2px solid #f00;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; /* Jarak antara logo dan teks */
        }
        .logo-img {
            width: 60px; /* Ukuran logo dibuat pas untuk satu baris */
            height: auto;
            filter: drop-shadow(0 0 5px #f00);
        }
        .logo-text {
            font-size: 28px; /* Ukuran teks yang pas untuk satu baris */
            font-weight: 900;
            color: #fc0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            text-shadow: 2px 2px 0 #f00;
        }

        /* Marquee Ringkas */
        .marquee-box { background: #111; color: #ff0; padding: 5px 0; border-bottom: 2px solid #333; font-weight: bold; font-size: 12px; }

        /* Banner Zeus - Dibuat Proporsional */
        .zeus-container { width: 100%; background: #000; line-height: 0; border-bottom: 2px solid #fc0; }
        .zeus-container img { width: 100%; max-width: 500px; height: auto; display: inline-block; }

        /* Tombol Utama - Langsung Terlihat di Layar Atas */
        .btn-section { padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 16px; border-radius: 8px; text-decoration: none; font-weight: 900; font-size: 20px; text-transform: uppercase; }
        .btn-login { background: linear-gradient(to bottom, #f00, #800); color: #fff; border: 2px solid #f66; box-shadow: 0 4px 12px rgba(255,0,0,0.5); }
        .btn-daftar { background: linear-gradient(to bottom, #fc0, #970); color: #000; border: 2px solid #fff; box-shadow: 0 4px 12px rgba(255,255,0,0.4); }

        /* Payment Section - Teks Komplit di Bawah */
        .payment-section { background: #111; margin: 10px 15px 20px; padding: 15px; border-radius: 10px; border: 1px solid #444; text-align: left; }
        .payment-title { color: #fc0; font-size: 12px; margin-bottom: 12px; font-weight: bold; text-transform: uppercase; text-align: center; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .payment-group-label { color: #f00; font-size: 10px; font-weight: bold; margin: 10px 0 5px; display: block; }
        .bank-list-text { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .bank-item { background: #222; padding: 8px; border-radius: 5px; font-size: 10px; font-weight: bold; color: #fff; border-left: 3px solid #0f0; display: flex; justify-content: space-between; align-items: center; }
        .status-on { color: #0f0; font-size: 8px; }

        .footer { padding: 30px 10px; color: #555; font-size: 10px; background: #080808; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logogaruda.png" alt="Logo" class="logo-img">
        <h1 class="logo-text">GARUDA 88</h1>
    </div>

    <div class="marquee-box">
        <marquee scrollamount="5">⚡ GARUDA 88: SITUS TERGACOR - PROSES DEPO & WD 24 JAM ONLINE ⚡</marquee>
    </div>

    <div class="zeus-container">
        <img src="zeus.webp" alt="Zeus Gacor">
    </div>

    <div class="btn-section">
        <a href="lobby.html" class="btn btn-login">MASUK / LOGIN</a>
        <a href="daftar.html" class="btn btn-daftar">DAFTAR SEKARANG</a>
    </div>

    <div class="payment-section">
        <div class="payment-title">METODE PEMBAYARAN (ONLINE)</div>
        <span class="payment-group-label">BANK LOKAL</span>
        <div class="bank-list-text">
            <div class="bank-item">BCA <span class="status-on">● ON</span></div>
            <div class="bank-item">MANDIRI <span class="status-on">● ON</span></div>
            <div class="bank-item">BNI <span class="status-on">● ON</span></div>
            <div class="bank-item">BRI <span class="status-on">● ON</span></div>
            <div class="bank-item">CIMB <span class="status-on">● ON</span></div>
            <div class="bank-item">BSI <span class="status-on">● ON</span></div>
        </div>

        <span class="payment-group-label">E-WALLET</span>
        <div class="bank-list-text">
            <div class="bank-item">DANA <span class="status-on">● ON</span></div>
            <div class="bank-item">OVO <span class="status-on">● ON</span></div>
            <div class="bank-item">GOPAY <span class="status-on">● ON</span></div>
            <div class="bank-item">QRIS <span class="status-on">● ON</span></div>
        </div>
    </div>

    <div class="footer">
        © 2026 GARUDA 88. ALL RIGHTS RESERVED.
    </div>

</body>
</html>
