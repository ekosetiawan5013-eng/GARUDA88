<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUDA 88 - LOGIN</title>
    <style>
        body { background: #600000; color: #fff; font-family: Arial, sans-serif; margin: 0; text-align: center; }
        .header { background: linear-gradient(to bottom, #8b0000, #000); padding: 15px 0; border-bottom: 2px solid #fc0; }
        .logo-garuda { width: 100px; margin-bottom: 5px; }
        .brand-name { color: #ffcc00; font-size: 28px; font-weight: 900; text-shadow: 2px 2px #000; margin: 0; }
        
        .marquee-box { background: #111; color: #ffcc00; padding: 6px 0; font-size: 13px; font-weight: bold; border-bottom: 2px solid #fc0; }
        
        .hero { width: 100%; border-bottom: 2px solid #fc0; overflow: hidden; }
        .hero img { width: 100%; display: block; object-fit: cover; object-position: center top; height: 250px; } /* Crop gambar zeus */

        /* FORM CONTAINER */
        .form-box { padding: 20px 0; background: #000; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        
        /* INPUT ITEMS */
        .input-item { 
            width: 85%; 
            max-width: 350px; 
            height: 50px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            box-sizing: border-box; 
            border: 2px solid #fc0;
            background: #222; 
            color: #fff; 
            text-align: center; 
            outline: none;
        }

        /* BUTTONS WITH ROTATING BORDER EFFECT */
        .btn-wrapper {
            width: 85%;
            max-width: 350px;
            height: 50px;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn {
            width: calc(100% - 4px);
            height: calc(100% - 4px);
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            text-decoration: none;
            position: relative;
            z-index: 1;
            border: none;
        }

        .btn-masuk { background: linear-gradient(to bottom, #f00, #800); color: #fff; }
        .btn-daftar { background: linear-gradient(to bottom, #fc0, #b8860b); color: #000; }

        /* Rotating border element */
        .btn-wrapper::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background-image: conic-gradient(transparent, #fff, transparent 30%);
            animation: rotate-border 2s linear infinite;
        }

        /* Color variations for border */
        .btn-wrapper.masuk-border::before {
            background-image: conic-gradient(transparent, #f00, transparent 30%);
        }

        .btn-wrapper.daftar-border::before {
            background-image: conic-gradient(transparent, #fc0, transparent 30%);
        }

        @keyframes rotate-border {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* BANK SECTION */
        .bank-section { width: 90%; max-width: 380px; background: rgba(0,0,0,0.9); border: 1px solid #fc0; padding: 15px; margin: 15px auto; border-radius: 10px; text-align: left; }
        .bank-title { color: #ffcc00; font-size: 13px; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px; text-align: center; }
        .bank-label { color: #f00; font-size: 12px; font-weight: bold; margin: 10px 0 5px; }
        .bank-names { color: #fff; font-size: 13px; font-weight: bold; line-height: 1.5; }
        .status { color: #0f0; font-size: 11px; font-weight: bold; display: block; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logogaruda.png" class="logo-garuda" alt="Garuda Emas">
        <h1 class="brand-name">GARUDA 88</h1>
    </div>

    <marquee class="marquee-box">SELAMAT DATANG DI GARUDA 88 - SITUS TERPERCAYA - DEPO WD ANTI RIBET</marquee>

    <div class="hero">
        <img src="zeus.webp" alt="Zeus">
    </div>

    <div class="form-box">
        <input type="text" id="u" class="input-item" placeholder="USERNAME">
        <input type="password" id="p" class="input-item" placeholder="PASSWORD">
        
        <div class="btn-wrapper masuk-border">
            <button onclick="login()" class="btn btn-masuk">MASUK SEKARANG</button>
        </div>
        
        <div class="btn-wrapper daftar-border">
            <a href="daftar.html" class="btn btn-daftar">DAFTAR AKUN VIP</a>
        </div>
    </div>

    <div class="bank-section">
        <div class="bank-title">METODE PEMBAYARAN RESMI</div>
        <div class="bank-label">BANK LOKAL:</div>
        <div class="bank-names">BCA | MANDIRI | BNI | BRI | CIMB | DANAMON</div>
        <div class="bank-label">E-WALLET:</div>
        <div class="bank-names">DANA | OVO | GOPAY | LINKAJA | SHOPEEPAY</div>
        <span class="status">● SEMUA ONLINE 24 JAM ●</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sb = supabase.createClient('https://sbtrcroononwihparzfk.supabase.co', 'sb_publishable_ebxfpUwby3RO6LqhyFkU-Q_3AMzoYyn');
        async function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(!user || !pass) return alert("Isi Data!");
            const { data } = await _sb.from('members').select('*').eq('username', user).eq('password', pass).single();
            if (data) { localStorage.setItem("user", data.username); window.location.href = "lobby.html"; }
            else { alert("Login Gagal!"); }
        }
    </script>
</body>
</html>
