<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUDA 88 - LOGIN</title>
    <style>
        body { background: #600000; color: #fff; font-family: Arial, sans-serif; margin: 0; text-align: center; }
        .header { background: linear-gradient(to bottom, #8b0000, #000); padding: 20px 0; border-bottom: 2px solid #fc0; }
        .logo-garuda { width: 120px; margin-bottom: 10px; }
        .brand-name { color: #ffcc00; font-size: 32px; font-weight: 900; text-shadow: 2px 2px #000; margin: 0; }
        
        .running-text { background: #111; color: #ffcc00; padding: 8px 0; font-size: 13px; font-weight: bold; overflow: hidden; border-bottom: 2px solid #fc0; }
        
        .hero-section { width: 100%; }
        .zeus-img { width: 100%; display: block; border-bottom: 2px solid #fc0; }

        .form-container { padding: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; background: #000; }
        input { width: 85%; padding: 12px; border-radius: 5px; border: 1px solid #fc0; background: #222; color: #fff; font-weight: bold; }
        
        .btn { width: 90%; max-width: 350px; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 18px; border: 2px solid #fff; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn-login { background: linear-gradient(to bottom, #ff0000, #8b0000); color: #fff; }
        .btn-register { background: linear-gradient(to bottom, #ffcc00, #b8860b); color: #000; text-decoration: none; display: block; line-height: 20px; }

        /* MENU BANK & EWALLET */
        .bank-container { width: 90%; max-width: 380px; background: rgba(0,0,0,0.9); border: 1px solid #fc0; padding: 15px; margin: 20px auto; border-radius: 10px; }
        .bank-title { color: #ffcc00; font-size: 14px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; text-transform: uppercase; }
        
        .bank-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-items: center; margin-top: 10px; }
        .bank-grid img { width: 100%; height: auto; background: #fff; border-radius: 4px; padding: 2px; }
        
        .status-online { color: #00ff00; font-size: 11px; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="garuda.webp" class="logo-garuda" alt="Garuda">
        <h1 class="brand-name">GARUDA 88</h1>
    </div>

    <marquee class="running-text">
        SELAMAT DATANG DI GARUDA 88 - PROSES DEPOSIT DAN WITHDRAW TERCEPAT DI INDONESIA - SITUS SLOT GACOR TERPERCAYA 2026
    </marquee>

    <div class="hero-section">
        <img src="zeus.webp" class="zeus-img" alt="Zeus King">
    </div>

    <div class="form-container">
        <input type="text" id="u" placeholder="USERNAME">
        <input type="password" id="p" placeholder="PASSWORD">
        <button onclick="prosesLogin()" class="btn btn-login">MASUK / LOGIN</button>
        <a href="daftar.html" class="btn btn-register">DAFTAR AKUN VIP</a>
    </div>

    <div class="bank-container">
        <div class="bank-title">METODE PEMBAYARAN ONLINE</div>
        
        <div style="text-align: left; color: #ff0000; font-size: 12px; font-weight: bold; margin-bottom: 5px;">BANK LOKAL:</div>
        <div class="bank-grid">
            <img src="https://i.ibb.co/Vv9X7vF/bca.png" alt="BCA">
            <img src="https://i.ibb.co/L5pYmZt/mandiri.png" alt="MANDIRI">
            <img src="https://i.ibb.co/pP9P6vV/bni.png" alt="BNI">
            <img src="https://i.ibb.co/mS6HnKq/bri.png" alt="BRI">
        </div>
        
        <div style="text-align: left; color: #ff0000; font-size: 12px; font-weight: bold; margin-top: 15px; margin-bottom: 5px;">E-WALLET:</div>
        <div class="bank-grid">
            <img src="https://i.ibb.co/4M0X5v9/dana.png" alt="DANA">
            <img src="https://i.ibb.co/0Y1f9rF/ovo.png" alt="OVO">
            <img src="https://i.ibb.co/G9p0X9P/gopay.png" alt="GOPAY">
            <img src="https://i.ibb.co/vX5f5pP/linkaja.png" alt="LINKAJA">
        </div>
        <span class="status-online">● SEMUA ONLINE 24 JAM</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sb = supabase.createClient('https://sbtrcroononwihparzfk.supabase.co', 'sb_publishable_ebxfpUwby3RO6LqhyFkU-Q_3AMzoYyn');
        
        async function prosesLogin() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(!user || !pass) return alert("Isi Data!");

            const { data } = await _sb.from('members').select('*').eq('username', user).eq('password', pass).single();
            if (data) {
                localStorage.setItem("loggedInUser", data.username);
                window.location.href = "lobby.html";
            } else {
                alert("Login Gagal!");
            }
        }
    </script>
</body>
</html>
