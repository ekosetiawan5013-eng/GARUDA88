<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - GARUDA 88</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { width: 90%; max-width: 350px; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #fc0; box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo span { color: #fc0; font-weight: 900; font-size: 24px; text-shadow: 0 0 10px #f00; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; border-radius: 5px; color: #fff; box-sizing: border-box; }
        
        .btn-login { background: linear-gradient(to bottom, #fc0, #970); width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .links { text-align: center; margin-top: 15px; font-size: 13px; }
        .links a { color: #fc0; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <span>GARUDA 88</span>
    </div>
    <form action="lobby.html"> <div class="form-group">
            <label>USERNAME</label>
            <input type="text" placeholder="Masukkan Username" required>
        </div>
        <div class="form-group">
            <label>PASSWORD</label>
            <input type="password" placeholder="Masukkan Password" required>
        </div>
        <button type="submit" class="btn-login">MASUK SEKARANG</button>
    </form>
    <div class="links">
        Belum punya akun? <a href="daftar.html">DAFTAR DISINI</a>
    </div>
</div>

</body>
</html>
