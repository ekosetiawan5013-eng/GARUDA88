<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUDA 88 OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; text-align: center; }
        
        /* Header Logo - Menggunakan Ikon Garuda Emas */
        .header { 
            background: linear-gradient(to bottom, #400, #000); 
            padding: 20px 10px; 
            border-bottom: 3px solid #ff0000;
        }
        .garuda-icon { font-size: 50px; color: #ffcc00; margin-bottom: 10px; display: block; filter: drop-shadow(0 0 10px #ff0000); }
        .logo-text {
            font-size: 35px; font-weight: 900; color: #ffcc00; margin: 0;
            text-shadow: 2px 2px 0px #ff0000, 0 0 15px #ffcc00;
            letter-spacing: 2px;
        }
        .sub-logo { font-size: 14px; color: #fff; letter-spacing: 4px; font-weight: bold; }

        /* Running Text */
        .marquee-box { background: #111; color: #ffff00; padding: 8px 0; border-bottom: 2px solid #333; font-size: 13px; font-weight: bold; }

        /* Banner Zeus */
        .zeus-container { width: 100%; line-height: 0; border-bottom: 2px solid #ffcc00; }
        .zeus-container img { width: 100%; height: auto; display: block; }

        /* Tombol Utama */
        .btn-section { padding: 25px 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 18px; border-radius: 8px; text-decoration: none; font-weight: 900; font-size: 20px; text-transform: uppercase; }
        .btn-login { background: linear-gradient(to bottom, #ff0000, #880000); color: #fff; border: 2px solid #ff4444; box-shadow: 0 4px 15px rgba(255,0,0,0.5); }
        .btn-daftar { background: linear-gradient(to bottom, #ffcc00, #997700); color: #000; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(255,204,0,0.4); }

        /* Bagian Bank/E-Wallet */
        .payment-section { background: #111; margin: 0 15px 20px; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .payment-title { color: #ffcc00; font-size: 12px; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; }
        .bank-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-items: center; }
        .bank-grid img { width: 100%; height: auto; filter: brightness(0.9); }

        .footer { padding: 25px 10px; color: #555; font-size: 10px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-eagle garuda-icon"></i>
        <div class="logo-text">GARUDA 88</div>
        <div class="sub-logo">OFFICIAL SITE</div>
    </div>

    <div class="marquee-box">
        <marquee scrollamount="6">⚡ SELAMAT DATANG DI GARUDA 88 - SITUS RESMI KAKEK ZEUS GACOR - DEPOSIT CEPAT WD KILAT ⚡</marquee>
    </div>

    <div class="zeus-container">
        <img src="zeus.webp" alt="Zeus Gacor">
    </div>

    <div class="btn-section">
        <a href="lobby.html" class="btn btn-login">MASUK / LOGIN</a>
        <a href="daftar.html" class="btn btn-daftar">DAFTAR AKUN VIP</a>
    </div>

    <div class="payment-section">
        <div class="payment-title">SUPPORTED PAYMENT</div>
        <div class="bank-grid">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Bank_Central_Asia.svg/1200px-Bank_Central_Asia.svg.png" alt="BCA">
            <img src="https://upload.wikimedia.org/wikipedia/id/thumb/5/55/BNI_logo.svg/1200px-BNI_logo.svg.png" alt="BNI">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Bank_Mandiri_logo_2016.svg/1200px-Bank_Mandiri_logo_2016.svg.png" alt="MANDIRI">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/68/BANK_BRI_logo.svg/1280px-BANK_BRI_logo.svg.png" alt="BRI">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Logo_dana_blue.svg/1200px-Logo_dana_blue.svg.png" alt="DANA">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Logo_OVO.svg/1200px-Logo_OVO.svg.png" alt="OVO">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Gopay_logo.svg/1200px-Gopay_logo.svg.png" alt="GOPAY">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Logo_QRIS.svg/1200px-Logo_QRIS.svg.png" alt="QRIS">
        </div>
    </div>

    <div class="footer">
        © 2026 GARUDA 88. ALL RIGHTS RESERVED.<br>
        PAGCOR & BMM TESTLABS CERTIFIED.
    </div>

</body>
</html>
