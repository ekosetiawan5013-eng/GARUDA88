<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUDA 88 OFFICIAL</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; text-align: center; }
        
        /* Header Logo Emas Mewah */
        .header { 
            background: linear-gradient(to bottom, #400, #000); 
            padding: 25px 10px; 
            border-bottom: 3px solid #ff0000;
        }
        .logo-text {
            font-size: 40px;
            font-weight: 900;
            color: #ffcc00;
            margin: 0;
            text-shadow: 2px 2px 0px #ff0000, 0 0 15px #ffcc00;
            letter-spacing: 2px;
        }
        .sub-logo { font-size: 18px; color: #fff; letter-spacing: 4px; margin-top: -5px; }

        /* Running Text */
        .marquee-box { background: #111; color: #ffff00; padding: 8px 0; border-bottom: 2px solid #333; font-size: 14px; font-weight: bold; }

        /* Banner Zeus */
        .zeus-container {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #ffcc00;
            line-height: 0;
        }
        .zeus-container img {
            width: 100%;
            max-width: 500px;
            height: auto;
            display: inline-block;
        }

        /* Tombol Utama */
        .btn-section { padding: 30px 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            padding: 18px; border-radius: 8px; text-decoration: none; font-weight: 900; font-size: 20px; text-transform: uppercase; 
            transition: 0.3s;
        }
        .btn-login { background: linear-gradient(to bottom, #ff0000, #880000); color: #fff; border: 2px solid #ff4444; box-shadow: 0 4px 15px rgba(255,0,0,0.5); }
        .btn-daftar { background: linear-gradient(to bottom, #ffcc00, #997700); color: #000; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(255,204,0,0.4); }

        .footer { padding: 30px 10px; color: #555; font-size: 11px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">GARUDA 88</div>
        <div class="sub-logo">OFFICIAL SITE</div>
    </div>

    <div class="marquee-box">
        <marquee scrollamount="6">⚡ SELAMAT DATANG DI GARUDA 88 - SITUS RESMI KAKEK ZEUS GACOR - DEPOSIT CEPAT WD KILAT ⚡</marquee>
    </div>

    <div class="zeus-container">
        <img src="zeus.webp" alt="Zeus Gacor">
    </div>

    <div class="btn-section">
        <a href="lobby.html" class="btn btn-login">MASUK / LOGIN</a>
        <a href="daftar.html" class="btn btn-daftar">DAFTAR AKUN VIP</a>
    </div>

    <div class="footer">
        © 2026 GARUDA 88. ALL RIGHTS RESERVED.<br>
        PAGCOR & BMM TESTLABS CERTIFIED.
    </div>

</body>
</html>
