<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUDA 88 - LOGIN</title>
    <style>
        body { background: #4a0000; color: #fff; font-family: Arial, sans-serif; margin: 0; text-align: center; overflow-x: hidden; padding-bottom: 80px; }
        .header { background: linear-gradient(to bottom, #700000, #000); padding: 20px 0; border-bottom: 2px solid #fc0; }
        .logo-garuda { width: 90px; margin-bottom: 10px; }

        /* HEADER: GARUDA 88 MERAH TERANG + BLOK HITAM + NEON PUTAR */
        .brand-container {
            position: relative;
            display: inline-block;
            padding: 8px 30px;
            background: #000; /* Tetap Pertahankan Blok Hitam */
            border-radius: 12px;
            overflow: hidden;
        }

        .brand-name {
            font-size: 36px;
            font-weight: 900;
            color: #ff0000; /* Rubah Menjadi Merah Terang */
            position: relative;
            z-index: 2;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px #000;
        }

        .brand-container::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 300%;
            background: conic-gradient(transparent, #ffcc00, #fff, #ffcc00, transparent 40%);
            animation: rotate-neon 3s linear infinite;
            top: -100%;
            left: -25%;
        }

        .brand-container::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: #000; /* Menutup bagian tengah blok hitam */
            border-radius: 10px;
            z-index: 1;
        }

        @keyframes rotate-neon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .marquee-box { background: #111; color: #ffcc00; padding: 6px 0; font-size: 13px; font-weight: bold; border-bottom: 2px solid #fc0; }
        
        .hero { width: 100%; border-bottom: 2px solid #fc0; background: #000; position: relative; height: 180px; overflow: hidden; }
        .hero img { width: 100%; position: absolute; top: -25px; left: 0; object-fit: cover; }

        .form-box { padding: 25px 0; background: #000; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .input-group { position: relative; width: 85%; max-width: 350px; }
        .input-item { 
            width: 100%; height: 50px; border-radius: 8px; font-size: 16px; font-weight: bold; 
            box-sizing: border-box; border: 2px solid #fc0; background: #222; color: #fff; 
            text-align: center; outline: none;
        }

        .pass-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #fc0; font-size: 18px; z-index: 10; }

        .btn-wrapper { width: 85%; max-width: 350px; height: 55px; position: relative; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .btn { width: calc(100% - 4px); height: calc(100% - 4px); border-radius: 6px; font-size: 18px; font-weight: bold; z-index: 1; border: none; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        
        .btn-masuk { background: linear-gradient(to bottom, #f00, #800); color: #fff; }
        .btn-daftar { background: linear-gradient(to bottom, #fc0, #b8860b); color: #000; }

        .btn-wrapper::before { content: ''; position: absolute; width: 150%; height: 150%; background-image: conic-gradient(transparent, #fff, transparent 30%); animation: rotate-neon 2s linear infinite; }
        .btn-wrapper.masuk-border::before { background-image: conic-gradient(transparent, #f00, transparent 30%); }
        .btn-wrapper.daftar-border::before { background-image: conic-gradient(transparent, #fc0, transparent 30%); }

        /* BANK SECTION */
        .bank-section { width: 95%; max-width: 400px; background: rgba(0,0,0,0.9); border: 2px solid #fc0; padding: 15px; margin: 20px auto; border-radius: 10px; }
        .bank-title { color: #ffcc00; font-size: 14px; font-weight: 800; border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .bank-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 15px; }
        .bank-item { color: #fff; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        
        /* TITIK HIJAU BERKEDIP */
        .dot { 
            width: 7px; height: 7px; background-color: #0f0; border-radius: 50%; 
            box-shadow: 0 0 8px #0f0; 
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0.2; }
        }

        /* LIVE CHAT FLOATING BUTTON */
        .live-chat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(to bottom, #fc0, #b8860b);
            color: #000;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 14px;
            text-decoration: none;
            box-shadow: 0 0 15px #fc0;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #fff;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header">
        <img src="logogaruda.png" class="logo-garuda" alt="Logo">
        <br>
        <div class="brand-container">
            <h1 class="brand-name">GARUDA 88</h1>
        </div>
    </div>

    <marquee class="marquee-box">SELAMAT DATANG DI GARUDA 88 - SITUS GACOR RESMI TERPERCAYA - DEPO/WD CEPAT 24 JAM</marquee>

    <div class="hero">
        <img src="zeus.webp" alt="Banner">
    </div>

    <div class="form-box">
        <div class="input-group">
            <input type="text" id="u" class="input-item" placeholder="USERNAME">
        </div>
        <div class="input-group">
            <input type="password" id="p" class="input-item" placeholder="PASSWORD">
            <i class="fas fa-eye pass-toggle" onclick="togglePassword()"></i>
        </div>
        <div class="btn-wrapper masuk-border">
            <button onclick="login()" class="btn btn-masuk">MASUK SEKARANG</button>
        </div>
        <div class="btn-wrapper daftar-border">
            <a href="daftar.html" class="btn btn-daftar">DAFTAR AKUN VIP</a>
        </div>
    </div>

    <div class="bank-section">
        <div class="bank-title">METODE DEPOSIT / PEMBAYARAN</div>
        <div class="bank-grid">
            <div class="bank-item"><span class="dot"></span>BCA</div>
            <div class="bank-item"><span class="dot"></span>MANDIRI</div>
            <div class="bank-item"><span class="dot"></span>BNI</div>
            <div class="bank-item"><span class="dot"></span>BRI</div>
            <div class="bank-item"><span class="dot"></span>CIMB</div>
            <div class="bank-item"><span class="dot"></span>PERMATA</div>
            <div class="bank-item"><span class="dot"></span>PANIN</div>
            <div class="bank-item"><span class="dot"></span>BTN</div>
            <div class="bank-item"><span class="dot"></span>DANAMON</div>
            <div class="bank-item"><span class="dot"></span>DANA</div>
            <div class="bank-item"><span class="dot"></span>OVO</div>
            <div class="bank-item"><span class="dot"></span>GOPAY</div>
        </div>
    </div>

    <a href="https://direct.lc.chat/YOUR_ID_HERE/" class="live-chat" target="_blank">
        <i class="fas fa-comments"></i> LIVE CHAT
    </a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        function togglePassword() {
            const p = document.getElementById('p');
            const icon = document.querySelector('.pass-toggle');
            if (p.type === "password") {
                p.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                p.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
