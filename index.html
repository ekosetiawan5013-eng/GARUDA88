<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUDA 88 - OFFICIAL</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        
        /* Header */
        .header { background: linear-gradient(to bottom, #400, #000); padding: 25px 10px; border-bottom: 3px solid #f00; }
        .logo-img { width: 140px; height: auto; filter: drop-shadow(0 0 10px #f00); margin-bottom: 5px; }
        .logo-text { font-size: 35px; font-weight: 900; color: #fc0; text-transform: uppercase; margin: 0; text-shadow: 2px 2px 0 #f00; }

        /* Marquee */
        .marquee-box { background: #111; color: #ff0; padding: 10px 0; border-bottom: 2px solid #333; font-weight: bold; font-size: 14px; }

        /* Zeus Banner */
        .zeus-container { width: 100%; border-bottom: 2px solid #fc0; line-height: 0; }
        .zeus-container img { width: 100%; max-width: 600px; height: auto; }

        /* Buttons */
        .btn-section { padding: 30px 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 20px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 22px; text-transform: uppercase; }
        .btn-login { background: linear-gradient(to bottom, #f00, #800); color: #fff; border: 2px solid #f66; }
        .btn-daftar { background: linear-gradient(to bottom, #fc0, #970); color: #000; border: 2px solid #fff; }

        /* Payment Section - ANTI GAGAL */
        .payment-section { background: #111; margin: 10px 15px 30px; padding: 20px; border-radius: 12px; border: 1px solid #444; }
        .payment-title { color: #fc0; font-size: 13px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }
        .bank-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; align-items: center; }
        
        /* Style Logo Bank Agar Terang */
        .bank-grid img { 
            width: 100%; 
            filter: brightness(1.5) contrast(1.2); /* Membuat logo sangat jelas */
            max-height: 25px;
            object-fit: contain;
        }

        .footer { padding: 30px 10px; color: #555; font-size: 11px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logogaruda.png" alt="Logo" class="logo-img">
        <h1 class="logo-text">GARUDA 88</h1>
    </div>

    <div class="marquee-box">
        <marquee>⚡ SELAMAT DATANG DI GARUDA 88 - PROSES DEPO & WD TERCEPAT - SALAM JP PAUS ⚡</marquee>
    </div>

    <div class="zeus-container">
        <img src="zeus.webp" alt="Zeus">
    </div>

    <div class="btn-section">
        <a href="lobby.html" class="btn btn-login">MASUK / LOGIN</a>
        <a href="daftar.html" class="btn btn-daftar">DAFTAR AKUN VIP</a>
    </div>

    <div class="payment-section">
        <div class="payment-title">Supported Payment</div>
        <div class="bank-grid">
            <img src="https://cdnjs.cloudflare.com/ajax/libs/payment-logos/0.3.0/cards/flat/bca.svg" alt="BCA">
            <img src="https://www.vectorlogo.zone/logos/bni/bni-ar21.svg" alt="BNI">
            <img src="https://www.vectorlogo.zone/logos/mandiribank/mandiribank-ar21.svg" alt="MANDIRI">
            <img src="https://www.vectorlogo.zone/logos/bri/bri-ar21.svg" alt="BRI">
            <img src="https://www.vectorlogo.zone/logos/dana_id/dana_id-ar21.svg" alt="DANA">
            <img src="https://www.vectorlogo.zone/logos/ovo_id/ovo_id-ar21.svg" alt="OVO">
            <img src="https://www.vectorlogo.zone/logos/gopay_id/gopay_id-ar21.svg" alt="GOPAY">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Logo_QRIS.svg/512px-Logo_QRIS.svg.png" alt="QRIS" style="filter: brightness(0) invert(1);">
        </div>
    </div>

    <div class="footer">
        © 2026 GARUDA 88. LISENSI PAGCOR.
    </div>

</body>
</html>
