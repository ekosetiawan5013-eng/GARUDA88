<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAGMATIC PLAY - GARUDA 88</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* HEADER */
        .header-provider {
            background: #111;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #fc0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .btn-back { color: #fc0; text-decoration: none; font-size: 20px; font-weight: bold; cursor: pointer; }
        .provider-title { font-size: 18px; font-weight: bold; color: #fff; }

        /* GRID GAME */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }
        .game-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            text-align: center;
            padding-bottom: 10px;
        }
        .game-card img { width: 100%; height: auto; display: block; }
        .game-name { font-size: 12px; font-weight: bold; margin: 10px 0; color: #fc0; }
        
        .btn-main {
            background: linear-gradient(to bottom, #fc0, #970);
            color: #000;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            padding: 10px 15px;
            border-radius: 5px;
            display: inline-block;
            cursor: pointer;
        }

        /* IFRAME CONTAINER (LAYAR GAME) */
        #game-container {
            display: none; /* Sembunyi sebelum diklik */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
        }
        #game-iframe {
            width: 100%;
            height: calc(100% - 50px); /* Sisakan ruang untuk tombol tutup */
            border: none;
        }
        .close-game {
            height: 50px;
            background: #111;
            color: #fc0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            border-top: 1px solid #fc0;
        }
    </style>
</head>
<body>

    <div class="header-provider" id="main-header">
        <a href="lobby.html" class="btn-back">❮</a>
        <div class="provider-title">PRAGMATIC PLAY</div>
    </div>

    <div class="game-grid">
        <div class="game-card">
            <img src="https://static.pragmaticplay.net/game_pic/square/200/vs20olympgate.png" alt="Gates of Olympus">
            <div class="game-name">GATES OF OLYMPUS</div>
            <div class="btn-main" onclick="openGame('https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=vs20olympgate&lang=id&cur=IDR')">MAIN SEKARANG</div>
        </div>

        <div class="game-card">
            <img src="https://static.pragmaticplay.net/game_pic/square/200/vs20starlight.png" alt="Starlight Princess">
            <div class="game-name">STARLIGHT PRINCESS</div>
            <div class="btn-main" onclick="openGame('https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=vs20starlight&lang=id&cur=IDR')">MAIN SEKARANG</div>
        </div>

        <div class="game-card">
            <img src="https://static.pragmaticplay.net/game_pic/square/200/vs20fruitsw.png" alt="Sweet Bonanza">
            <div class="game-name">SWEET BONANZA</div>
            <div class="btn-main" onclick="openGame('https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=vs20fruitsw&lang=id&cur=IDR')">MAIN SEKARANG</div>
        </div>

        <div class="game-card">
            <img src="https://static.pragmaticplay.net/game_pic/square/200/vs40wildwest.png" alt="Wild West Gold">
            <div class="game-name">WILD WEST GOLD</div>
            <div class="btn-main" onclick="openGame('https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=vs40wildwest&lang=id&cur=IDR')">MAIN SEKARANG</div>
        </div>
    </div>

    <div id="game-container">
        <iframe id="game-iframe" src=""></iframe>
        <div class="close-game" onclick="closeGame()">✖ TUTUP GAME (KEMBALI KE LOBBY)</div>
    </div>

    <script>
        function openGame(url) {
            document.getElementById('game-iframe').src = url;
            document.getElementById('game-container').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Matikan scroll background
        }

        function closeGame() {
            document.getElementById('game-iframe').src = ''; // Hentikan suara game
            document.getElementById('game-container').style.display = 'none';
            document.body.style.overflow = 'auto'; // Aktifkan scroll kembali
        }
    </script>

</body>
</html>
