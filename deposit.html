<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR DEPOSIT - GARUDA 88</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .main-header { background: #cc0000; color: #fff; text-align: center; padding: 12px; font-weight: bold; font-size: 18px; text-transform: uppercase; border-bottom: 2px solid #fff; }
        .user-section { background: #1a1a1a; padding: 15px; border-bottom: 1px solid #444; }
        .user-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .balance-box { background: #000; border: 1px solid #cc0000; padding: 5px 10px; border-radius: 4px; color: #fff; font-weight: bold; }
        
        .box-simetris { 
            background: #000; padding: 15px; margin: 10px auto; width: 90%; 
            border-radius: 8px; border: 1px solid #cc0000; font-size: 13px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center; min-height: 140px;
        }
        .data-row { display: grid; grid-template-columns: 100px 10px 1fr; margin-bottom: 8px; color: #ccc;}
        .data-row strong { color: #fff; }

        .method-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 5%; background: #000; }
        .method-card { background: #222; border: 1px solid #444; border-radius: 8px; padding: 12px; text-align: center; cursor: pointer; color: #fff; }
        .method-card.active { background: #fff; color: #000; border: 2px solid #cc0000; font-weight: bold; }
        .method-card i { font-size: 20px; display: block; margin-bottom: 5px; }

        #qris-content { text-align: center; display: none; }
        /* NAMA FILE SUDAH SAYA GANTI JADI QRIS.PNG */
        .qris-image { width: 220px; height: auto; background: #fff; margin: 10px auto; padding: 10px; border-radius: 5px; display: block; border: 3px solid #fff; }

        .form-section { padding: 15px 5%; }
        input { background: #fff; border: 1px solid #ccc; padding: 12px; border-radius: 4px; width: 100%; box-sizing: border-box; color: #000; font-weight: bold; font-size: 16px; margin-bottom: 15px;}
        .btn-kirim { background: linear-gradient(to bottom, #00aa00, #006600); color: white; width: 100%; padding: 15px; border: 1px solid #fff; border-radius: 5px; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; }

        .peraturan-section { background: #000; padding: 20px 5%; font-size: 12px; line-height: 1.6; border-top: 1px solid #333; color: #ddd; margin-bottom: 40px;}
        .peraturan-section h3 { color: #fff; text-align: center; margin-bottom: 10px; border-bottom: 1px solid #cc0000; padding-bottom: 5px;}
    </style>
</head>
<body>

    <div class="main-header">KASIR DEPOSIT</div>

    <div class="user-section">
        <div class="user-row">
            <span id="p-username" style="font-weight:bold; text-transform:uppercase;">LOADING...</span>
            <span style="color: #0f0; font-size: 11px;"><i class="fas fa-circle"></i> Online</span>
        </div>
        <div class="user-row">
            <div class="balance-box">SALDO: IDR <span id="p-balance">0</span></div>
            <button style="background:#cc0000; color:#fff; border:1px solid #fff; padding:5px 10px; border-radius:4px;" onclick="location.reload()">REFRESH</button>
        </div>
        
        <div class="box-simetris">
            <div style="color: #888; font-size: 11px; margin-bottom: 8px;">Data Bank Terdaftar Anda:</div>
            <div class="data-row"><span>Nama Bank</span><span>:</span><strong id="m-bank">...</strong></div>
            <div class="data-row"><span>Nama Rek</span><span>:</span><strong id="m-acc-name">...</strong></div>
            <div class="data-row"><span>No Rek</span><span>:</span><strong id="m-acc-num">...</strong></div>
        </div>
    </div>

    <div class="method-selector">
        <div class="method-card active" id="btn-bank" onclick="switchTab('bank')">
            <i class="fas fa-university"></i>
            <span>BANK TRANSFER</span>
        </div>
        <div class="method-card" id="btn-qris" onclick="switchTab('qris')">
            <i class="fas fa-qrcode"></i>
            <span>QRIS / E-WALLET</span>
        </div>
    </div>

    <div class="box-simetris">
        <div id="bank-content">
            <p style="color:#cc0000; font-weight:bold; text-align:center; margin-top:0;">TUJUAN TRANSFER</p>
            <div class="data-row"><span>Nama Bank</span><span>:</span><strong>DANA</strong></div>
            <div class="data-row"><span>Atas Nama</span><span>:</span><strong>EKO SETIAWAN</strong></div>
            <div class="data-row"><span>No Rekening</span><span>:</span><strong style="color: #ff0; font-size: 18px;">082157578668</strong></div>
        </div>

        <div id="qris-content">
            <p style="color:#cc0000; font-weight:bold; text-align:center; margin-top:0;">SCAN QRIS UNTUK BAYAR</p>
            <img src="qris.png" class="qris-image" alt="QRIS DANA">
            <p style="font-size: 11px; color: #ff0;">Screenshot & Scan di Aplikasi DANA</p>
        </div>
    </div>

    <div class="form-section">
        <input type="number" id="amount" placeholder="Minimal 10.000">
        <button onclick="kirimDepo()" class="btn-kirim">KONFIRMASI DEPOSIT</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sb = supabase.createClient('https://sbtrcroononwihparzfk.supabase.co', 'sb_publishable_ebxfpUwby3RO6LqhyFkU-Q_3AMzoYyn');
        const session = JSON.parse(localStorage.getItem('userSession'));
        
        function switchTab(type) {
            document.getElementById('bank-content').style.display = type === 'bank' ? 'block' : 'none';
            document.getElementById('qris-content').style.display = type === 'qris' ? 'block' : 'none';
            document.getElementById('btn-bank').className = type === 'bank' ? 'method-card active' : 'method-card';
            document.getElementById('btn-qris').className = type === 'qris' ? 'method-card active' : 'method-card';
        }

        if(session) {
            document.getElementById('p-username').innerText = session.username;
            document.getElementById('p-balance').innerText = session.balance.toLocaleString('id-ID');
            fetchMemberBank();
        }

        async function fetchMemberBank() {
            const { data } = await _sb.from('members').select('*').eq('username', session.username).single();
            if (data) {
                document.getElementById('m-bank').innerText = data.bank_name;
                document.getElementById('m-acc-name').innerText = data.acc_name;
                document.getElementById('m-acc-num').innerText = data.acc_number;
            }
        }

        async function kirimDepo() {
            const amt = document.getElementById('amount').value;
            if(amt < 10000) return alert("Minimal 10.000!");
            const target = document.getElementById('btn-qris').classList.contains('active') ? "QRIS" : "DANA";
            const { error } = await _sb.from('transactions').insert([{ username: session.username, type: 'DEPOSIT', amount: parseInt(amt), bank_target: target, status: 'PENDING' }]);
            if(!error) { alert("Berhasil Terkirim!"); window.location.href = "lobby.html"; }
        }
    </script>
</body>
</html>
