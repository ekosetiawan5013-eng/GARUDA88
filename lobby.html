<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBBY VIP - GARUDA 88</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #1a0000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        
        /* HEADER LOBBY */
        .header { background: linear-gradient(180deg, #700000 0%, #000 100%); padding: 15px; border-bottom: 2px solid #fc0; text-align: center; }
        .brand-name { color: #ff0000; font-size: 24px; font-weight: 900; text-shadow: 2px 2px #000; margin: 0; }

        /* KARTU MEMBER (SALDO & USER ID) */
        .member-card { 
            background: linear-gradient(135deg, #330000 0%, #000 100%); 
            margin: 20px; border-radius: 15px; padding: 20px; border: 1px solid #fc0;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }
        .user-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .user-info i { font-size: 40px; color: #fc0; }
        .user-name { font-size: 18px; font-weight: bold; color: #fff; text-transform: uppercase; }
        .user-status { color: #0f0; font-size: 11px; font-weight: bold; }

        .balance-box { background: #222; border-radius: 10px; padding: 15px; text-align: center; border: 1px dashed #fc0; }
        .balance-label { font-size: 12px; color: #ccc; margin-bottom: 5px; }
        .balance-amount { font-size: 28px; font-weight: 900; color: #fc0; }

        /* MENU BUTTONS */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .menu-item { 
            background: #000; border: 1px solid #700000; border-radius: 10px; padding: 20px;
            text-align: center; color: #fff; text-decoration: none; transition: 0.3s;
        }
        .menu-item:active { transform: scale(0.95); background: #4a0000; }
        .menu-item i { font-size: 30px; color: #fc0; margin-bottom: 10px; display: block; }
        .menu-item span { font-weight: bold; font-size: 14px; }

        .logout-btn { 
            margin: 20px; padding: 12px; background: linear-gradient(to bottom, #ff0000, #800000); 
            color: #fff; text-align: center; border-radius: 8px; font-weight: bold; cursor: pointer; border: 1px solid #fff;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="brand-name">GARUDA 88 VIP</h1>
    </div>

    <div class="member-card">
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <div>
                <div class="user-name" id="display-username">USER: LOADING...</div>
                <div class="user-status"><i class="fas fa-gem"></i> MEMBER VIP</div>
            </div>
        </div>
        <div class="balance-box">
            <div class="balance-label">TOTAL SALDO ANDA</div>
            <div class="balance-amount">IDR <span id="display-balance">0</span></div>
        </div>
    </div>

    <div class="menu-grid">
        <a href="deposit.html" class="menu-item">
            <i class="fas fa-university"></i>
            <span>DEPOSIT</span>
        </a>
        <a href="withdraw.html" class="menu-item">
            <i class="fas fa-money-bill-wave"></i>
            <span>WITHDRAW</span>
        </a>
        <div class="menu-item" onclick="alert('Game sedang maintenance, Bos!')">
            <i class="fas fa-gamepad"></i>
            <span>MULAI MAIN</span>
        </div>
        <div class="menu-item" onclick="window.open('https://wa.me/NOMOR_BOS_DISINI')">
            <i class="fas fa-headset"></i>
            <span>SUPPORT</span>
        </div>
    </div>

    <div class="logout-btn" onclick="logout()">LOGOUT (KELUAR)</div>

    <script>
        // Ambil data sesi login
        const session = JSON.parse(localStorage.getItem('userSession'));

        if (!session) {
            // Jika belum login, tendang ke index.html
            window.location.href = "index.html";
        } else {
            // 1. Tampilkan Username (Bukan Nama Asli)
            document.getElementById('display-username').innerText = "USER: " + session.username;
            
            // 2. Tampilkan Saldo dengan format ribuan
            const formattedBalance = new Intl.NumberFormat('id-ID').format(session.balance || 0);
            document.getElementById('display-balance').innerText = formattedBalance;
        }

        function logout() {
            localStorage.removeItem('userSession');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
