<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBBY - GARUDA 88</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* HEADER LOBBY - Diperbesar agar Gagah */
        .header-lobby {
            background: #000;
            padding: 20px 15px; /* Padding ditambah */
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f00; /* Border lebih tebal */
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-box img { width: 55px; height: auto; filter: drop-shadow(0 0 8px #f00); } /* Logo diperbesar */
        .logo-box span { color: #fc0; font-weight: 900; font-size: 28px; letter-spacing: 1px; text-shadow: 2px 2px #f00; } /* Font diperbesar */
        .btn-deposit { background: linear-gradient(to bottom, #fc0, #970); color: #000; padding: 10px 18px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 15px; box-shadow: 0 0 10px rgba(255,204,0,0.5); }

        /* KATEGORI SLOT */
        .category-bar {
            background: linear-gradient(to right, #fc0, #970);
            padding: 12px 15px;
            margin: 15px 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #000;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* GRID PERMAINAN */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 10px;
        }
        
        /* KARTU PROVIDER - Dibuat Kontras */
        .game-card {
            background: #1a1a1a; /* Background kartu lebih terang dari body agar kontras */
            border: 1px solid #fc0; /* Border Emas tipis */
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            transition: 0.3s;
        }
        .game-card:hover { transform: translateY(-5px); border-color: #f00; }

        /* KONTAINER LOGO - Putih Bersih */
        .logo-container {
            width: 100%;
            height: 110px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-sizing: border-box;
        }
        .provider-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* DETAIL PROVIDER - Gelap Kontras */
        .provider-details {
            padding: 12px 8px;
            text-align: center;
            background: #111; /* Bagian bawah lebih gelap */
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .provider-label { font-size: 10px; font-weight: bold; color: #fc0; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        
        /* TOMBOL PLAY */
        .btn-play {
            background: linear-gradient(to bottom, #fc0, #970);
            color: #000;
            text-decoration: none;
            font-size: 13px;
            font-weight: 900;
            padding: 10px 0;
            border-radius: 6px;
            display: block;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #080808;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 2px solid #f00;
            z-index: 1000;
        }
        .nav-item { text-decoration: none; color: #666; font-size: 11px; text-align: center; }
        .nav-item.active { color: #fc0; }
        .nav-icon { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header-lobby">
        <div class="logo-box">
            <img src="logogaruda.png" alt="Logo">
            <span>GARUDA 88</span>
        </div>
        <a href="#" class="btn-deposit">Deposit</a>
    </div>

    <div class="category-bar">
        <span>⚡ SLOT GAMES GACOR</span>
        <span style="font-size: 10px; background: #000; color: #fff; padding: 3px 8px; border-radius: 4px;">LOBBY</span>
    </div>

    <div class="game-grid">
        <div class="game-card">
            <div class="logo-container">
                <img src="pragmatic.webp" alt="Pragmatic" class="provider-img">
            </div>
            <div class="provider-details">
                <div class="provider-label">PRAGMATIC PLAY</div>
                <a href="#" class="btn-play">PLAY NOW</a>
            </div>
        </div>

        <div class="game-card">
            <div class="logo-container">
                <img src="pgsoft.webp" alt="PG Soft" class="provider-img">
            </div>
            <div class="provider-details">
                <div class="provider-label">PG SOFT</div>
                <a href="#" class="btn-play">PLAY NOW</a>
            </div>
        </div>

        <div class="game-card">
            <div class="logo-container">
                <img src="fastspin.webp" alt="Fastspin" class="provider-img">
            </div>
            <div class="provider-details">
                <div class="provider-label">FASTSPIN</div>
                <a href="#" class="btn-play">PLAY NOW</a>
            </div>
        </div>

        <div class="game-card">
            <div class="logo-container">
                <img src="habanero.webp" alt="Habanero" class="provider-img">
            </div>
            <div class="provider-details">
                <div class="provider-label">HABANERO</div>
                <a href="#" class="btn-play">PLAY NOW</a>
            </div>
        </div>
        
        </div>

    <div class="bottom-nav">
        <a href="lobby.html" class="nav-item active"><span class="nav-icon">🏠</span>Lobby</a>
        <a href="#" class="nav-item"><span class="nav-icon">💰</span>Deposit</a>
        <a href="#" class="nav-item"><span class="nav-icon">🎁</span>Promo</a>
        <a href="#" class="nav-item"><span class="nav-icon">👤</span>Akun</a>
        <a href="index.html" class="nav-item"><span class="nav-icon">🚪</span>Keluar</a>
    </div>

</body>
</html>
