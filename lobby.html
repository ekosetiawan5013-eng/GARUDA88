<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBBY - GARUDA 88</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff0000;
            --neon-green: #00ff00;
        }

        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Header */
        .header-top { 
            background: linear-gradient(180deg, #4b0000 0%, #000 100%); 
            padding: 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--primary-red); 
        }

        .brand-container { display: flex; align-items: center; gap: 10px; }
        .garuda-logo { height: 35px; width: auto; }
        .logo-text { 
            color: var(--primary-red); 
            font-family: 'Orbitron', sans-serif;
            font-size: 20px; 
            font-weight: 900; 
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7); 
            margin: 0; 
            text-transform: uppercase; 
        }

        .btn-deposit-top { 
            background: linear-gradient(180deg, #ff4d4d 0%, var(--primary-red) 100%); 
            color: #fff; padding: 7px 18px; border-radius: 5px; 
            font-weight: bold; text-decoration: none; font-size: 13px; 
        }

        /* User Info Bar */
        .user-info-bar { background: #0f0f0f; padding: 12px 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .u-balance span { color: var(--primary-red); font-weight: bold; }
        .refresh-btn { background: #222; color: #fff; padding: 6px 12px; border-radius: 4px; border: 1px solid #444; cursor: pointer; }

        /* Slot Bar */
        .slot-bar { background: var(--primary-red); color: #fff; margin: 10px; padding: 8px 12px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .btn-lobby-label { background: #000; color: #fff; padding: 3px 12px; border-radius: 3px; font-size: 11px; }

        /* --- GRID PROVIDER --- */
        .provider-container { padding: 0 10px 20px 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .provider-card { 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            aspect-ratio: 1 / 1; 
            border: 1.5px solid var(--primary-red); 
        }

        .img-wrapper { 
            flex: 1; 
            display: flex; 
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        .provider-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }

        /* --- PERBAIKAN KHUSUS LOGO --- */

        /* 1. IDN SLOT: Menghilangkan sisa hitam dengan background senada */
        .card-idn { 
            background: radial-gradient(circle, #2a1b5d 0%, #1a103d 100%); /* Warna senada logo IDN */
        }
        .card-idn .img-wrapper { padding: 10px; }
        .card-idn img { object-fit: contain; }

        /* 2. Microgaming & Habanero: Background Putih */
        .card-white { background-color: #fff; }
        .card-white .img-wrapper { padding: 15px; }
        .card-white img { object-fit: contain; }

        /* 3. Playtech: Padding sedikit agar proporsional */
        .card-playtech .img-wrapper { padding: 5px; }
        .card-playtech img { object-fit: contain; }

        /* Play Now Button */
        @keyframes soft-blink { 0% { filter: brightness(100%); } 50% { filter: brightness(130%); } 100% { filter: brightness(100%); } }
        .play-now {
            background: linear-gradient(180deg, #ff3333 0%, #990000 100%);
            color: #fff; text-align: center; padding: 10px 0; font-size: 12px; font-weight: 900; border: none; width: 100%; text-transform: uppercase; animation: soft-blink 1.5s infinite;
        }

        /* --- FOOTER & NAV --- */
        .footer-info { text-align: center; padding: 20px 10px 110px 10px; background: #000; color: #888; font-size: 11px; }
        .copyright-text { border-top: 1px solid #222; padding-top: 15px; line-height: 1.6; }
        strong { color: var(--primary-red); }
        .dot { height: 7px; width: 7px; border-radius: 50%; display: inline-block; background: var(--neon-green); margin-right: 5px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--primary-red); display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px 0; z-index: 1000; }
        .nav-item { text-align: center; color: #fff; text-decoration: none; font-size: 10px; font-weight: bold; }
        .nav-item i { display: block; font-size: 20px; color: var(--primary-red); margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-container">
            <img src="logogaruda.png" alt="Logo" class="garuda-logo">
            <div class="logo-text">GARUDA 88</div>
        </div>
        <a href="deposit.html" class="btn-deposit-top">DEPOSIT</a>
    </div>

    <div class="user-info-bar">
        <div class="u-data">
            <div class="u-name" id="user-id">USER</div>
            <div class="u-balance">Balance: <span>IDR. <span id="user-saldo">0</span></span></div>
        </div>
        <button class="refresh-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div class="slot-bar">
        <span><i class="fas fa-fire"></i> HOT SLOT GAMES</span>
        <div class="btn-lobby-label">LOBBY</div>
    </div>

    <div class="provider-container">
        <div class="provider-card"><div class="img-wrapper"><img src="pragmatic.webp"></div><div class="play-now">PLAY NOW</div></div>
        <div class="provider-card"><div class="img-wrapper"><img src="pgsoft.webp"></div><div class="play-now">PLAY NOW</div></div>
        
        <div class="provider-card card-idn"><div class="img-wrapper"><img src="idnslot.webp"></div><div class="play-now">PLAY NOW</div></div>
        
        <div class="provider-card card-white"><div class="img-wrapper"><img src="habanero.webp"></div><div class="play-now">PLAY NOW</div></div>
        
        <div class="provider-card card-white"><div class="img-wrapper"><img src="microgaming.webp"></div><div class="play-now">PLAY NOW</div></div>
        
        <div class="provider-card card-playtech card-white"><div class="img-wrapper"><img src="playtech.webp"></div><div class="play-now">PLAY NOW</div></div>
        
        <div class="provider-card"><div class="img-wrapper"><img src="nolimit.webp"></div><div class="play-now">PLAY NOW</div></div>
        <div class="provider-card"><div class="img-wrapper"><img src="redtiger.webp"></div><div class="play-now">PLAY NOW</div></div>
    </div>

    <div class="footer-info">
        <div class="copyright-text">
            &copy; Copyright 2014 - 2026 . <strong>GARUDA 88</strong> . All Rights Reserved.<br>
            Official Licensed by PAGCOR and BMM Testlabs.
        </div>
    </div>

    <div class="bottom-nav">
        <a href="lobby.html" class="nav-item"><i class="fas fa-home"></i>HOME</a>
        <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-money-check-alt"></i>WD</a>
        <a href="#" onclick="logout()" class="nav-item"><i class="fas fa-sign-out-alt"></i>EXIT</a>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('userSession'));
        if (!session) { window.location.href = "index.html"; } 
        else {
            document.getElementById('user-id').innerText = session.username.toUpperCase();
            document.getElementById('user-saldo').innerText = new Intl.NumberFormat('id-ID').format(session.balance || 0);
        }
        function logout() { localStorage.removeItem('userSession'); window.location.href = "index.html"; }
    </script>
</body>
</html>
