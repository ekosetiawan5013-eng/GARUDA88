<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBBY VIP - GARUDA 88</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #1a0000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; padding-bottom: 80px; }
        
        /* HEADER LOBBY */
        .header { background: linear-gradient(180deg, #700000 0%, #000 100%); padding: 15px; border-bottom: 2px solid #fc0; text-align: center; position: sticky; top: 0; z-index: 100; }
        .brand-name { color: #ff0000; font-size: 24px; font-weight: 900; text-shadow: 2px 2px #000; margin: 0; }

        /* KARTU MEMBER */
        .member-card { 
            background: linear-gradient(135deg, #330000 0%, #000 100%); 
            margin: 15px; border-radius: 12px; padding: 15px; border: 1px solid #fc0;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }
        .user-info { display: flex; justify-content: space-between; align-items: center; }
        .u-id { font-size: 14px; font-weight: bold; color: #fc0; text-transform: uppercase; }
        .u-bal { font-size: 18px; font-weight: 900; color: #0f0; text-align: right; }
        .u-bal span { font-size: 10px; color: #ccc; display: block; font-weight: normal; }

        /* GRID GAME (INI PERUBAHANNYA) */
        .section-title { padding: 0 15px; font-size: 14px; font-weight: bold; color: #fc0; margin-bottom: 10px; border-left: 3px solid #f00; margin-left: 15px; }
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 15px; }
        .game-item { background: #000; border: 1px solid #444; border-radius: 8px; overflow: hidden; text-align: center; transition: 0.2s; }
        .game-item:active { transform: scale(0.95); border-color: #fc0; }
        .game-item img { width: 100%; display: block; border-bottom: 1px solid #333; }
        .game-name { font-size: 9px; padding: 5px 0; font-weight: bold; color: #fff; text-transform: uppercase; }

        /* NAVIGASI BAWAH (MOBILE STYLE) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid #fc0; display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px 0; z-index: 1000; }
        .nav-item { text-align: center; color: #fff; text-decoration: none; font-size: 10px; font-weight: bold; }
        .nav-item i { display: block; font-size: 20px; color: #fc0; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="brand-name">GARUDA 88</h1>
    </div>

    <div class="member-card">
        <div class="user-info">
            <div class="u-id"><i class="fas fa-user-circle"></i> <span id="display-username">LOADING...</span></div>
            <div class="u-bal"><span>SALDO ANDA:</span>IDR <span id="display-balance">0</span></div>
        </div>
    </div>

    <div class="section-title">GAME PRAGMATIC PLAY</div>

    <div class="game-grid">
        <div class="game-item" onclick="alert('Saldo tidak cukup!')">
            <img src="https://via.placeholder.com/150/111/fc0?text=OLYMPUS">
            <div class="game-name">GATES OF OLYMPUS</div>
        </div>
        <div class="game-item" onclick="alert('Saldo tidak cukup!')">
            <img src="https://via.placeholder.com/150/111/fc0?text=MAHJONG">
            <div class="game-name">MAHJONG WAYS</div>
        </div>
        <div class="game-item" onclick="alert('Saldo tidak cukup!')">
            <img src="https://via.placeholder.com/150/111/fc0?text=BONANZA">
            <div class="game-name">SWEET BONANZA</div>
        </div>
        <div class="game-item" onclick="alert('Saldo tidak cukup!')">
            <img src="https://via.placeholder.com/150/111/fc0?text=STARLIGHT">
            <div class="game-name">STARLIGHT PRINCESS</div>
        </div>
        <div class="game-item" onclick="alert('Saldo tidak cukup!')">
            <img src="https://via.placeholder.com/150/111/fc0?text=KOI+GATE">
            <div class="game-name">KOI GATE</div>
        </div>
        <div class="game-item" onclick="alert('Saldo tidak cukup!')">
            <img src="https://via.placeholder.com/150/111/fc0?text=CANDY">
            <div class="game-name">SUGAR RUSH</div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="lobby.html" class="nav-item"><i class="fas fa-home"></i>HOME</a>
        <a href="deposit.html" class="nav-item"><i class="fas fa-university"></i>DEPOSIT</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-money-bill-wave"></i>WITHDRAW</a>
        <a href="#" onclick="logout()" class="nav-item"><i class="fas fa-sign-out-alt"></i>LOGOUT</a>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('userSession'));

        if (!session) {
            window.location.href = "index.html";
        } else {
            // Tampilkan Username & Saldo dari sesi login
            document.getElementById('display-username').innerText = session.username;
            document.getElementById('display-balance').innerText = new Intl.NumberFormat('id-ID').format(session.balance || 0);
        }

        function logout() {
            localStorage.removeItem('userSession');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
