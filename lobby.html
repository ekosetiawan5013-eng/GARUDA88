<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLOT GAMES - GARUDA 88</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        
        /* Header & Banner */
        .header { background: #000; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0000; position: sticky; top: 0; z-index: 1000; }
        .logo { color: #ffff00; font-size: 22px; font-weight: 900; letter-spacing: 1px; }
        .btn-depo { background: linear-gradient(to bottom, #ffff00, #ccaa00); color: #000; padding: 8px 20px; border-radius: 5px; font-weight: bold; text-decoration: none; box-shadow: 0 0 10px #ffff00; font-size: 14px; }

        .slot-title-bar { background: linear-gradient(to bottom, #ffff00, #ccaa00); margin: 10px; border-radius: 8px; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; color: #000; box-shadow: 0 0 15px rgba(255,255,0,0.3); }
        .btn-lobby { background: #000; color: #fff; padding: 5px 15px; border-radius: 5px; text-decoration: none; font-size: 12px; border: 1px solid #fff; }

        /* Grid Provider */
        .provider-list { padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 80px; }

        /* Card Style - Identik OLXTOTO */
        .card { 
            background: #000; border: 1px solid #ffff00; border-radius: 5px; 
            display: flex; flex-direction: column; height: 190px; position: relative; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(255,255,0,0.1);
        }
        
        /* Aksen Kuning di Pojok */
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 15px; height: 15px; border-left: 3px solid #ffff00; border-top: 3px solid #ffff00; z-index: 5; }
        .card::after { content: ""; position: absolute; top: 0; right: 0; width: 15px; height: 15px; border-right: 3px solid #ffff00; border-top: 3px solid #ffff00; z-index: 5; }

        .card-top { flex: 1; display: flex; padding: 5px; position: relative; }
        .info-side { flex: 1; z-index: 2; display: flex; flex-direction: column; justify-content: space-around; }
        .char-side { flex: 0.8; position: relative; }

        .p-logo { max-width: 90%; height: 25px; object-fit: contain; filter: drop-shadow(0 0 3px #fff); }
        .mini-icons { display: flex; gap: 3px; }
        .mini-icons img { width: 22px; height: 22px; border-radius: 3px; border: 1px solid #ffff00; }

        .btn-play { background: #ffff00; color: #000; text-align: center; padding: 4px; border-radius: 3px; font-weight: 900; font-size: 10px; text-decoration: none; box-shadow: 0 0 5px #ffff00; text-transform: uppercase; }

        .char-img { position: absolute; right: -5px; bottom: 0; height: 95%; z-index: 1; filter: drop-shadow(-5px 0 5px rgba(0,0,0,0.8)); }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #ff0000; z-index: 1000; }
        .nav-item { text-align: center; color: #888; text-decoration: none; font-size: 10px; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: #ffff00; }
    </style>
</head>
