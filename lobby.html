<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBBY - GARUDA 88</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* HEADER LOBBY */
        .header-lobby {
            background: #000;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f00;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { width: 40px; height: auto; filter: drop-shadow(0 0 5px #f00); }
        .logo-box span { color: #fc0; font-weight: 900; font-size: 22px; }
        .btn-deposit { background: #fc0; color: #000; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; }

        /* KATEGORI SLOT */
        .category-bar {
            background: linear-gradient(to right, #fc0, #970);
            padding: 12px 15px;
            margin: 15px 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #000;
            font-weight: bold;
        }

        /* GRID PERMAINAN - 2 KOLOM */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 10px;
        }
        .game-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 12px;
            transition: 0.3s;
        }
        .game-card img { width: 100%; height: auto; display: block; border-bottom: 1px solid #222; }
        .provider-label { font-size: 11px; font-weight: bold; color: #aaa; padding: 10px 0; text-transform: uppercase; }
        .btn-play {
            background: linear-gradient(to bottom, #fc0, #970);
            color: #000;
            text-decoration: none;
            font-size: 13px;
            font-weight: 900;
            padding: 10px 0;
            margin: 0 10px;
            border-radius: 6px;
            display: block;
        }

        /* NAVIGASI BAWAH */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #080808;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 2px solid #f00;
        }
        .nav-item { text-decoration: none; color: #666; font-size: 11px; text-align: center; }
        .nav-item.active { color: #fc0; }
        .nav-icon { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header-lobby">
        <div class="logo-box">
            <img src="logogaruda.png" alt="Logo">
            <span>GARUDA 88</span>
        </div>
        <a href="deposit.html" class="btn-deposit">Deposit</a>
    </div>

    <div class="category-bar">
        <span>⚡ SLOT GAMES GACOR</span>
        <span style="font-size: 10px; background: #000; color: #fff; padding: 3px 8px; border-radius: 4px;">LOBBY</span>
    </div>

    <div class="game-grid">
        <div class="game-card">
            <img src="pragmatic.webp" alt="Pragmatic">
            <div class="provider-label">PRAGMATIC PLAY</div>
            <a href="#" class="btn-play">PLAY NOW</a>
        </div>

        <div class="game-card">
            <img src="pgsoft.webp" alt="PG Soft">
            <div class="provider-label">PG SOFT</div>
            <a href="#" class="btn-play">PLAY NOW</a>
        </div>

        <div class="game-card">
            <img src="fastspin.webp" alt="Fastspin">
            <div class="provider-label">FASTSPIN</div>
            <a href="#" class="btn-play">PLAY NOW</a>
        </div>

        <div class="game-card">
            <img src="habanero.webp" alt="Habanero">
            <div class="provider-label">HABANERO</div>
            <a href="#" class="btn-play">PLAY NOW</a>
        </div>

        <div class="game-card">
            <img src="idnslot.webp" alt="IDN Slot">
            <div class="provider-label">IDN SLOT</div>
            <a href="#" class="btn-play">PLAY NOW</a>
        </div>

        <div class="game-card">
            <img src="microgaming.webp" alt="Microgaming">
            <div class="provider-label">MICROGAMING</div>
            <a href="#" class="btn-play">PLAY NOW</a>
        </div>

        <div class="game-card">
            <img src="nolimit.webp" alt="NoLimit">
            <div class="provider-label">NOLIMIT CITY</div>
            <a href="#" class="btn-play">PLAY NOW</a>
        </div>

        <div class="game-card">
            <img src="playtech.webp" alt="Playtech">
            <div class="provider-label">PLAYTECH</div>
            <a href="#" class="btn-play">PLAY NOW</a>
        </div>

        <div class="game-card">
            <img src="redtiger.webp" alt="Red Tiger">
            <div class="provider-label">RED TIGER</div>
            <a href="#" class="btn-play">PLAY NOW</a>
        </div>

        <div class="game-card">
            <img src="gmw.webp" alt="GMW">
            <div class="provider-label">GMW</div>
            <a href="#" class="btn-play">PLAY NOW</a>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="lobby.html" class="nav-item active"><span class="nav-icon">🏠</span>Lobby</a>
        <a href="#" class="nav-item"><span class="nav-icon">💰</span>Deposit</a>
        <a href="#" class="nav-item"><span class="nav-icon">🎁</span>Promo</a>
        <a href="#" class="nav-item"><span class="nav-icon">👤</span>Akun</a>
        <a href="index.html" class="nav-item"><span class="nav-icon">🚪</span>Keluar</a>
    </div>

</body>
</html>
