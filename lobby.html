<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBBY VIP - GARUDA 88</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS ASLI BOS - TIDAK ADA YANG DIUBAH */
        body { background: #1a0000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        .header { background: linear-gradient(180deg, #700000 0%, #000 100%); padding: 15px; border-bottom: 2px solid #fc0; text-align: center; }
        .brand-name { color: #ff0000; font-size: 24px; font-weight: 900; text-shadow: 2px 2px #000; margin: 0; }
        .member-card { background: linear-gradient(135deg, #330000 0%, #000 100%); margin: 20px; border-radius: 15px; padding: 20px; border: 1px solid #fc0; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        .user-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .user-info i { font-size: 40px; color: #fc0; }
        .user-name { font-size: 18px; font-weight: bold; color: #fff; text-transform: uppercase; }
        .balance-box { background: #222; border-radius: 10px; padding: 15px; text-align: center; border: 1px dashed #fc0; }
        .balance-amount { font-size: 28px; font-weight: 900; color: #fc0; }
        
        /* MENU PROVIDER GAME YANG BOS MAKSUD */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .menu-item { background: #000; border: 1px solid #700000; border-radius: 10px; padding: 20px; text-align: center; color: #fff; text-decoration: none; }
        .menu-item i { font-size: 30px; color: #fc0; margin-bottom: 10px; display: block; }
        .logout-btn { margin: 20px; padding: 12px; background: linear-gradient(to bottom, #ff0000, #800000); color: #fff; text-align: center; border-radius: 8px; font-weight: bold; border: 1px solid #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="brand-name">GARUDA 88 VIP</h1>
    </div>

    <div class="member-card">
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <div>
                <div class="user-name" id="display-username">MEMANGGIL DATA...</div>
                <div style="color: #0f0; font-size: 11px; font-weight: bold;"><i class="fas fa-gem"></i> MEMBER VIP</div>
            </div>
        </div>
        <div class="balance-box">
            <div style="font-size: 12px; color: #ccc;">TOTAL SALDO ANDA</div>
            <div class="balance-amount">IDR <span id="display-balance">0</span></div>
        </div>
    </div>

    <div class="menu-grid">
        <a href="deposit.html" class="menu-item">
            <i class="fas fa-university"></i>
            <span>DEPOSIT</span>
        </a>
        <a href="withdraw.html" class="menu-item">
            <i class="fas fa-money-bill-wave"></i>
            <span>WITHDRAW</span>
        </a>
        <div class="menu-item" onclick="alert('Provider Pragmatic Play sedang maintenance!')">
            <i class="fas fa-gamepad"></i>
            <span>SLOT GAMES</span>
        </div>
        <div class="menu-item" onclick="window.location.href='https://wa.me/NOMOR_BOS'">
            <i class="fas fa-headset"></i>
            <span>LIVE SUPPORT</span>
        </div>
    </div>

    <div class="logout-btn" onclick="logout()">LOGOUT (KELUAR SITUS)</div>

    <script>
        // Kunci untuk menghubungkan Login dan Lobby
        const session = JSON.parse(localStorage.getItem('userSession'));

        if (!session) {
            // Kalau tidak ada data login, balikkan ke awal
            window.location.href = "index.html";
        } else {
            // Pasang Username ke layar
            document.getElementById('display-username').innerText = "USER: " + session.username.toUpperCase();
            
            // Pasang Saldo ke layar dengan format rupiah
            const formattedBalance = new Intl.NumberFormat('id-ID').format(session.balance || 0);
            document.getElementById('display-balance').innerText = formattedBalance;
        }

        function logout() {
            localStorage.removeItem('userSession');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
