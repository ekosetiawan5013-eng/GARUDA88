<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBBY - GARUDA 88</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding-bottom: 90px; }
        
        /* HEADER - Proporsional & Elegan */
        .header-lobby {
            background: #000;
            padding: 15px 10px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f00;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-box { display: flex; align-items: center; gap: 8px; }
        .logo-box img { width: 45px; height: auto; filter: drop-shadow(0 0 5px #f00); } 
        /* Ukuran Font disesuaikan agar tidak pecah baris */
        .logo-box span { color: #fc0; font-weight: 900; font-size: 22px; letter-spacing: 0.5px; text-shadow: 1px 1px #f00; white-space: nowrap; } 
        .btn-deposit { background: linear-gradient(to bottom, #fc0, #970); color: #000; padding: 8px 12px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; }

        /* KATEGORI SLOT */
        .category-bar {
            background: linear-gradient(to right, #fc0, #970);
            padding: 12px 15px;
            margin: 15px 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #000;
            font-weight: bold;
        }

        /* GRID PERMAINAN - 10 PROVIDER */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 10px;
        }
        
        .game-card {
            background: #1a1a1a;
            border: 1px solid #fc0; 
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }

        .logo-container {
            width: 100%;
            height: 100px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-sizing: border-box;
        }
        .provider-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .provider-details {
            padding: 10px 6px;
            text-align: center;
            background: #111;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .provider-label { font-size: 10px; font-weight: bold; color: #fc0; text-transform: uppercase; margin-bottom: 8px; }
        
        .btn-play {
            background: linear-gradient(to bottom, #fc0, #970);
            color: #000;
            text-decoration: none;
            font-size: 12px;
            font-weight: 900;
            padding: 8px 0;
            border-radius: 5px;
            display: block;
        }

        /* NAVIGASI BAWAH */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #080808;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 2px solid #f00;
            z-index: 1000;
        }
        .nav-item { text-decoration: none; color: #666; font-size: 11px; text-align: center; }
        .nav-item.active { color: #fc0; }
        .nav-icon { display: block; font-size: 20px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="header-lobby">
        <div class="logo-box">
