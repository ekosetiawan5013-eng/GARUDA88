<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLOT GAMES - GARUDA 88</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        /* Header Logo & Deposit */
        .header { background: #000; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0000; }
        .logo { color: #ffff00; font-size: 20px; font-weight: 900; }
        .btn-depo-top { background: linear-gradient(to bottom, #ffff00, #ffcc00); color: #000; padding: 8px 20px; border-radius: 5px; font-weight: bold; text-decoration: none; font-size: 14px; box-shadow: 0 0 10px rgba(255,255,0,0.5); }

        /* Sub-Header Slot Games */
        .sub-header { background: linear-gradient(to right, #660000, #000); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffff00; margin-top: 5px; }
        .sub-header span { color: #ffff00; font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .btn-lobby { background: #222; color: #fff; padding: 5px 15px; border-radius: 5px; border: 1px solid #fff; font-size: 12px; text-decoration: none; }

        /* Grid Provider */
        .provider-container { padding: 10px; display: grid; grid-template-columns: repeat(1, 1fr); gap: 15px; margin-bottom: 80px; }
        
        /* Card Provider Style */
        .card { 
            background: #111; border: 2px solid #ffff00; border-radius: 10px; 
            display: flex; height: 160px; overflow: hidden; position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }
        
        .card-left { flex: 1.2; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid #333; }
        .card-right { flex: 1; position: relative; background: #000; }
        
        .provider-logo { width: 80%; filter: drop-shadow(0 0 5px #fff); }
        .mini-games { display: flex; gap: 5px; margin-top: 10px; }
        .mini-games img { width: 30px; height: 30px; border-radius: 3px; border: 1px solid #444; }
        
        .btn-play { 
            background: linear-gradient(to bottom, #ffff00, #ccaa00); 
            color: #000; padding: 5px 0; width: 100%; border-radius: 20px; 
            text-align: center; font-weight: 900; text-decoration: none; 
            font-size: 12px; display: block; margin-top: 10px;
        }

        .char-img { position: absolute; bottom: 0; right: 0; height: 140px; z-index: 2; }
        .bg-glow { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,215,0,0.2) 0%, transparent 70%); }

        /* Navigasi Bawah */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #ff0000; z-index: 100; }
        .nav-item { text-align: center; color: #888; text-decoration: none; font-size: 11px; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: #ffff00; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">GARUDA 88</div>
        <a href="#" class="btn-depo-top">Deposit</a>
    </div>

    <div class="sub-header">
        <span><i class="fas fa-slot-machine">🎰</i> SLOT GAMES</span>
        <a href="lobby.html" class="btn-lobby">LOBBY</a>
    </div>

    <div class="provider-container">
        
        <div class="card">
            <div class="card-left">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Pragmatic_Play_logo.svg/1200px-Pragmatic_Play_logo.svg.png" class="provider-logo">
                <div class="mini-games">
                    <img src="https://img.imageboss.me/smb/width/200/26279.png">
                    <img src="https://img.imageboss.me/smb/width/200/26280.png">
                    <img src="https://img.imageboss.me/smb/width/200/26281.png">
                </div>
                <a href="#" class="btn-play">PLAY NOW</a>
            </div>
            <div class="card-right">
                <div class="bg-glow"></div>
                <img src="https://static.wixstatic.com/media/7608f5_f87e5967969b4e699268d80c05a1e7b1~mv2.png/v1/fill/w_440,h_534,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/Sweet_Bonanza_Character.png" class="char-img">
            </div>
        </div>

        <div class="card">
            <div class="card-left">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0e/PG_Soft_logo.png" class="provider-logo" style="width: 60%;">
                <div class="mini-games">
                    <img src="https://img.imageboss.me/smb/width/200/26285.png">
                    <img src="https://img.imageboss.me/smb/width/200/26286.png">
                    <img src="https://img.imageboss.me/smb/width/200/26287.png">
                </div>
                <a href="#" class="btn-play">PLAY NOW</a>
            </div>
            <div class="card-right">
                <div class="bg-glow"></div>
                <img src="https://www.pgsoft.com/uploads/Games/Images/f02e5b87-0b1a-4c8d-8a8b-1b0a1b0a1b0a.png" class="char-img">
            </div>
        </div>

        <div class="card">
            <div class="card-left">
                <h2 style="margin:0; font-style: italic;">IDN SLOT</h2>
                <div class="mini-games">
                    <img src="https://img.imageboss.me/smb/width/200/26290.png">
                    <img src="https://img.imageboss.me/smb/width/200/26291.png">
                    <img src="https://img.imageboss.me/smb/width/200/26292.png">
                </div>
                <a href="#" class="btn-play">PLAY NOW</a>
            </div>
            <div class="card-right">
                <div class="bg-glow"></div>
                <img src="https://idnsite.com/img/games/character/idnslot.png" class="char-img">
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <a href="lobby.html" class="nav-item active"><i class="fas fa-home"></i>Lobby</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i>Deposit</a>
        <a href="#" class="nav-item"><i class="fas fa-history"></i>Riwayat</a>
        <a href="#" class="nav-item"><i class="fas fa-user"></i>Akun</a>
        <a href="index.html" class="nav-item"><i class="fas fa-sign-out-alt"></i>Keluar</a>
    </div>

</body>
</html>
