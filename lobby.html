<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBBY - GARUDA 88</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background: #1a0000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Header Logo & Deposit */
        .header-top { background: linear-gradient(180deg, #700000 0%, #000 100%); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #fc0; }
        .logo-text { color: #ff0000; font-size: 20px; font-weight: 900; text-shadow: 2px 2px #000; margin: 0; text-transform: uppercase; }
        .btn-deposit-top { background: #fc0; color: #000; padding: 6px 15px; border-radius: 5px; font-weight: bold; text-decoration: none; font-size: 13px; }

        /* Section Username & Saldo */
        .user-info-bar { background: #000; padding: 12px 15px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        .u-data { display: flex; flex-direction: column; }
        .u-name { font-size: 16px; font-weight: bold; color: #fff; text-transform: uppercase; margin-bottom: 2px; }
        .u-balance { font-size: 13px; color: #ccc; }
        .u-balance span { color: #ff0000; font-weight: bold; }
        .refresh-btn { background: #00c853; color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; text-decoration: none; border: none; }

        /* Slot Bar */
        .slot-bar { background: #fc0; color: #000; margin: 10px; padding: 8px 12px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 14px; }
        .btn-lobby-label { background: #000; color: #fff; padding: 2px 10px; border-radius: 3px; font-size: 10px; }

        /* Grid Provider */
        .provider-container { 
            padding: 0 10px 100px 10px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
        }
        
        .provider-card { 
            border: 1.5px solid #fc0; 
            border-radius: 10px; 
            overflow: hidden; 
            background: #000; 
            display: flex;
            flex-direction: column;
            aspect-ratio: 1 / 1; 
        }
        
        .img-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Default: Full untuk Pragmatic, PGSoft, dll */
        .provider-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        /* PERBAIKAN: IDN SLOT (Full Background & Tidak Sesak) */
        .card-idn .img-wrapper {
            background: #2e1a4e; /* Warna ungu gelap khas IDN agar full */
            padding: 15px;
        }
        .card-idn img {
            object-fit: contain;
            max-width: 100%;
            max-height: 100%;
        }

        /* PERBAIKAN: HABANERO (Full Background & Tidak Sesak) */
        .card-habanero .img-wrapper {
            background: #ffffff; /* Warna putih khas Habanero agar full */
            padding: 18px;
        }
        .card-habanero img {
            object-fit: contain;
            max-width: 100%;
            max-height: 100%;
        }

        /* PERBAIKAN: MICROGAMING */
        .card-microgaming .img-wrapper {
            background: #ffffff;
            padding: 15px;
        }
        .card-microgaming img { 
            object-fit: contain;
            max-width: 100%;
            max-height: 100%;
        }

        /* Tombol Play Now */
        .play-now {
            background: #fc0;
            color: #000;
            text-align: center;
            padding: 10px 0;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            width: 100%;
            display: block;
            cursor: pointer;
        }

        /* Navigasi Bawah */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid #fc0; display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px 0; z-index: 1000; }
        .nav-item { text-align: center; color: #fff; text-decoration: none; font-size: 10px; font-weight: bold; }
        .nav-item i { display: block; font-size: 18px; color: #fc0; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="header-top">
        <h1 class="logo-text">GARUDA 88</h1>
        <a href="deposit.html" class="btn-deposit-top">DEPOSIT</a>
    </div>

    <div class="user-info-bar">
        <div class="u-data">
            <div class="u-name" id="user-id">BANJARAN</div>
            <div class="u-balance">Balance: <span>IDR. <span id="user-saldo">0</span></span></div>
        </div>
        <button class="refresh-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>

    <div class="slot-bar">
        <span><i class="fas fa-gamepad"></i> SLOT GAMES</span>
        <div class="btn-lobby-label">LOBBY</div>
    </div>

    <div class="provider-container">
        <div class="provider-card">
            <div class="img-wrapper"><img src="pragmatic.webp"></div>
            <div class="play-now">PLAY NOW</div>
        </div>
        <div class="provider-card">
            <div class="img-wrapper"><img src="pgsoft.webp"></div>
            <div class="play-now">PLAY NOW</div>
        </div>
        <div class="provider-card card-idn">
            <div class="img-wrapper"><img src="idnslot.webp"></div>
            <div class="play-now">PLAY NOW</div>
        </div>
        <div class="provider-card card-habanero">
            <div class="img-wrapper"><img src="habanero.webp"></div>
            <div class="play-now">PLAY NOW</div>
        </div>
        <div class="provider-card card-microgaming">
            <div class="img-wrapper"><img src="microgaming.webp"></div>
            <div class="play-now">PLAY NOW</div>
        </div>
        <div class="provider-card">
            <div class="img-wrapper"><img src="nolimit.webp"></div>
            <div class="play-now">PLAY NOW</div>
        </div>
        <div class="provider-card">
            <div class="img-wrapper"><img src="playtech.webp"></div>
            <div class="play-now">PLAY NOW</div>
        </div>
        <div class="provider-card">
            <div class="img-wrapper"><img src="redtiger.webp"></div>
            <div class="play-now">PLAY NOW</div>
        </div>
        <div class="provider-card">
            <div class="img-wrapper"><img src="fastspin.webp"></div>
            <div class="play-now">PLAY NOW</div>
        </div>
        <div class="provider-card">
            <div class="img-wrapper"><img src="gmw.webp"></div>
            <div class="play-now">PLAY NOW</div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="lobby.html" class="nav-item"><i class="fas fa-home"></i>HOME</a>
        <a href="deposit.html" class="nav-item"><i class="fas fa-university"></i>DEPO</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-money-bill-wave"></i>WD</a>
        <a href="#" onclick="logout()" class="nav-item"><i class="fas fa-sign-out-alt"></i>LOGOUT</a>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('userSession'));
        if (!session) {
            window.location.href = "index.html";
        } else {
            document.getElementById('user-id').innerText = session.username.toUpperCase();
            document.getElementById('user-saldo').innerText = new Intl.NumberFormat('id-ID').format(session.balance || 0);
        }

        function logout() {
            localStorage.removeItem('userSession');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
